            const parts = [];
            let first = '';
            if (cfg.addressStreet) {

                if (cfg.addressNumber) first += ', ' + cfg.addressNumber;
            }
            if (first) parts.push(first);
            if (cfg.addressNeighborhood) parts.push(cfg.addressNeighborhood);
            let cityState = '';
            if (cfg.addressCity) cityState = cfg.addressCity;
            if (cfg.addressState) cityState = cityState ? (cityState + ' - ' + cfg.addressState) : cfg.addressState;
            if (cityState) parts.push(cityState);

            return parts.join(' • ');

        function filterProduction() {
            const start = document.getElementById('prod-filter-start').value;
            const end = document.getElementById('prod-filter-end').value;

            const filtered = appState.production.filter(p => {
                const matchesDate = (!start || p.date >= start) && (!end || p.date <= end);

        function openProductionModal(preSelectedId = null, preSelectedQty = null) {
            const finalProducts = appState.inventory.filter(p => p.type === 'final');
            
            let html = `

                                <option value="">Selecione o pré-moldado...</option>

                            <div>

                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Data da Produção</label>
                                <input type="date" id="prod-date" required value="${new Date().toISOString().split('T')[0]}" class="w-full p-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none focus:ring-2 focus:ring-primary-500">

                        </div>
                        
                        <div id="recipe-preview" class="p-4 bg-primary-50 dark:bg-primary-900/20 rounded-xl border border-primary-100 dark:border-primary-800 hidden">
                            <h5 class="text-xs font-bold text-primary-700 dark:text-primary-300 uppercase mb-2">Consumo Estimado de Matéria-Prima:</h5>
                            <ul id="recipe-list" class="space-y-1 text-sm"></ul>
                        </div>

                        <div class="flex justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700">
                            <button type="button" onclick="closeModal()" class="px-6 py-2 rounded-xl border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">Cancelar</button>
                            <button type="submit" class="px-6 py-2 rounded-xl bg-success text-white font-bold hover:brightness-95 shadow-lg transition-all active:scale-95">Confirmar Produção</button>
                        </div>
                    </form>
                </div>
            `;
            openModal(html);

            const select = document.getElementById('prod-product');
            const qtyInput = document.getElementById('prod-qty');
            
            const updatePreview = () => {
                const pId = parseInt(select.value);
                const qty = parseInt(qtyInput.value) || 0;
                const product = appState.inventory.find(p => p.id === pId);
                const previewDiv = document.getElementById('recipe-preview');
                const list = document.getElementById('recipe-list');

                if (product && product.recipe && qty > 0) {
                    previewDiv.classList.remove('hidden');
                    list.innerHTML = product.recipe.map(item => {
                        const material = appState.inventory.find(m => m.id === item.productId);
                        const totalNeeded = item.qty * qty;
                        const isShort = material.stock < totalNeeded;
                        return `
                            <li class="flex justify-between items-center ${isShort ? 'text-danger font-bold' : 'text-slate-600 dark:text-slate-400'}">
                                <span>${material.name}</span>
                                <span>${totalNeeded.toFixed(2)} ${material.unit} ${isShort ? '(Estoque Insuficiente!)' : ''}</span>
                            </li>
                        `;
                    }).join('');
                } else {
                    previewDiv.classList.add('hidden');
                }
            };

            select.onchange = updatePreview;
            qtyInput.oninput = updatePreview;
            
            // Run preview immediately if pre-selected
            if (preSelectedId && preSelectedQty) {
                updatePreview();
            }

            document.getElementById('production-form').onsubmit = (e) => {
                e.preventDefault();
                const pId = parseInt(select.value);
                const qty = parseInt(qtyInput.value);
                const date = document.getElementById('prod-date').value;
                const product = appState.inventory.find(p => p.id === pId);

                // Check stock for all materials first
                let stockOk = true;
                product.recipe.forEach(item => {
                    const material = appState.inventory.find(m => m.id === item.productId);
                    if (material.stock < (item.qty * qty)) stockOk = false;
                });

                if (!stockOk) {
                    showToast('Estoque de matéria-prima insuficiente!', 'error');
                    return;
                }

                // 1. Record materials used for history
                const usedMaterials = product.recipe.map(item => {
                    const material = appState.inventory.find(m => m.id === item.productId);
                    const totalUsed = item.qty * qty;
                    material.stock -= totalUsed; // 2. Deduct from stock
                    return { productId: material.id, name: material.name, qty: totalUsed };
                });

                // 3. Add to finished product stock
                product.stock += qty;

                // 4. Save Production Record
                appState.production.push({
                    id: Date.now(),
                    productId: pId,
                    productName: product.name,
                    qty: qty,
                    date: date,
                    materials: usedMaterials
                });

                saveData();
                closeModal();
                renderProducao();
                showToast('Produção registrada com sucesso!');
            };
        }

        function deleteProduction(id) {
            if (confirm('Deseja excluir este registro de produção? (O estoque não será revertido automaticamente)')) {
                appState.production = appState.production.filter(p => p.id !== id);
                saveData();
                renderProducao();
                showToast('Registro excluído.', 'error');
            }
        }

        function renderDashboardSubTab() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const currentMonth = todayStr.substring(0, 7);
            
            // LÓGICA DE DATA DE RESET (Ponto de Equilíbrio)
            let resetDateStr = appState.config.breakEvenResetDate || currentMonth + '-01';
            let resetDate = new Date(resetDateStr);
            const todayDate = new Date(todayStr);
            let daysElapsed = Math.floor((todayDate - resetDate) / (1000 * 60 * 60 * 24)) + 1;
            if (daysElapsed > 30) {
                appState.config.breakEvenResetDate = todayStr;
                saveData();
                resetDateStr = todayStr;
                resetDate = new Date(resetDateStr);
                daysElapsed = 1;
            }

            // Recalcular variáveis necessárias para as sub-abas
            const salariesCosts = appState.employees.reduce((acc, emp) => acc + (emp.salary || 0), 0);
            const baseFixedCosts = appState.fixedAccounts.reduce((acc, a) => acc + a.amount, 0) + salariesCosts;
            
            // Gastos reais desde o último reset
            const actualExpenses = appState.transactions
                .filter(t => t.type === 'saida' && t.date >= resetDateStr)
                .reduce((acc, t) => acc + t.amount, 0);

            // Vendas desde o último reset
            const monthlySales = appState.sales.filter(s => s.date >= resetDateStr && s.status === 'completed');
            
            const totalRevenue = monthlySales.reduce((acc, s) => acc + s.total, 0);
            const totalVariableCosts = monthlySales.reduce((acc, s) => {
                const materialsCost = s.items.reduce((itemAcc, item) => {
                    const product = appState.inventory.find(p => p.id === item.productId);
                    return itemAcc + (product ? (product.costPrice * item.qty) : 0);
                }, 0);
                return acc + materialsCost + (s.deliveryHelperCostTotal || 0);
            }, 0);
            
            const contributionMargin = totalRevenue - totalVariableCosts;
            const contributionMarginPct = totalRevenue > 0 ? (contributionMargin / totalRevenue) : 0.35;
            
            const totalBreakEvenNeeded = contributionMarginPct > 0 ? (baseFixedCosts / contributionMarginPct) : baseFixedCosts;
            const breakEvenProgress = totalBreakEvenNeeded > 0 ? Math.min(100, (totalRevenue / totalBreakEvenNeeded) * 100) : 100;
            const isBreakEvenReached = totalRevenue >= totalBreakEvenNeeded;
            const remainingToSell = Math.max(0, totalBreakEvenNeeded - totalRevenue);

            const lowStockItems = appState.inventory.filter(p => p.stock <= p.minStock);
            const urgentEquipment = appState.equipment.filter(e => {
                const last = new Date(e.lastMaintenance);
                const next = new Date(last);
                next.setDate(last.getDate() + e.maintenanceInterval);
                return Math.ceil((next - new Date()) / (1000 * 60 * 60 * 24)) <= 7;
            });

            // Contas Fixas Urgentes (Atrasadas ou Próximas)
            const todayDay = new Date().getDate();
            const urgentFixedAccounts = appState.fixedAccounts.filter(acc => {
                const isPaid = appState.transactions.some(t => t.description.includes(acc.description) && t.date.startsWith(currentMonth));
                if (isPaid) return false;
                
                // Atrasada (dia do vencimento menor que hoje) ou Próxima (nos próximos 5 dias)
                const isOverdue = acc.dueDay < todayDay;
                const isUpcoming = acc.dueDay >= todayDay && acc.dueDay <= todayDay + 5;
                return isOverdue || isUpcoming;
            });

            if (dashboardSubTab === 'geral') {
                return `
                    <div class="space-y-4">
                        <!-- Break Even Minimalist Card -->
                        <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm relative overflow-hidden">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="text-sm font-bold flex items-center gap-2">
                                    <i data-lucide="target" class="w-4 h-4 text-primary-500"></i>
                                    Meta de Equilíbrio
                                </h4>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] font-black uppercase text-slate-400 bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-lg">Ciclo: ${formatDate(resetDateStr)}</span>
                                    <button onclick="resetBreakEven()" class="p-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-red-500 hover:text-white rounded-lg transition-all" title="Zerar Ciclo">
                                        <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3 flex items-center gap-2">
                                <span class="text-[9px] font-black uppercase text-slate-400">Dia ${daysElapsed}/30</span>
                                <div class="h-1.5 w-20 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                                    <div class="h-1.5 bg-primary-500" style="width: ${Math.min(100, (daysElapsed / 30) * 100)}%"></div>
                                </div>
                            </div>
                            <div class="relative h-4 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden mb-3">
                                <div class="${isBreakEvenReached ? 'bg-green-500' : 'bg-primary-500'} h-full transition-all duration-1000" style="width: ${breakEvenProgress}%"></div>
                                <div class="absolute inset-0 flex items-center justify-center text-[9px] font-black text-white mix-blend-difference">${Math.round(breakEvenProgress)}% COBERTO</div>
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-0.5">Faltam Vender</p>
                                    <p class="text-lg font-black ${isBreakEvenReached ? 'text-green-600' : 'text-slate-900 dark:text-white'}">
                                        ${isBreakEvenReached ? 'LUCRO!' : formatCurrency(remainingToSell)}
                                    </p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-0.5">Vendido Líquido</p>
                                    <p class="text-sm font-bold text-primary-600">${formatCurrency(totalRevenue)}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Main Charts Group -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm">
                                <h4 class="text-sm font-bold mb-4 flex items-center gap-2">
                                    <i data-lucide="bar-chart-2" class="w-4 h-4 text-primary-500"></i>
                                    Vendas vs Gastos

                                <div class="h-[200px]">
                                    <canvas id="chart-cashflow"></canvas>

                            <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm overflow-hidden">
                                <div class="flex justify-between items-center mb-4">
                                    <h4 class="text-sm font-bold flex items-center gap-2">
                                        <i data-lucide="list" class="w-4 h-4 text-primary-500"></i>
                                        Últimas Vendas
                                    </h4>
                                    <button onclick="switchTab('vendas'); setTimeout(() => switchVendasTab('historico'), 50)" class="text-[10px] font-bold text-primary-600 uppercase">Ver todas</button>
                                </div>
                                <div class="space-y-3">
                                    ${appState.sales.slice(-4).reverse().map(s => `
                                        <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-700">
                                            <div class="flex items-center gap-3">
                                                <div class="w-8 h-8 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center text-primary-600 shadow-sm">
                                                    <i data-lucide="user" class="w-4 h-4"></i>

                                                <div>
                                                    <p class="text-xs font-bold text-slate-900 dark:text-white truncate max-w-[100px]">${s.clientName}</p>
                                                    <p class="text-[9px] text-slate-500">${formatDate(s.date)}</p>

        function switchDashboardTab(subTabId) {
            dashboardSubTab = subTabId;
            
            // 1. Atualizar visual dos botões de sub-aba sem recarregar o header
            const subNav = document.querySelector('.flex.gap-2.p-1.bg-slate-100.dark\\:bg-slate-800.rounded-2xl.mb-6');
            if (subNav) {
                const buttons = subNav.querySelectorAll('button');
                buttons.forEach(btn => {
                    const isGeral = btn.innerText.includes('Geral') && subTabId === 'geral';
                    const isFin = btn.innerText.includes('Finanças') && subTabId === 'financeiro';
                    const isAlert = btn.innerText.includes('Avisos') && subTabId === 'alertas';
                    
                    if (isGeral || isFin || isAlert) {
                        btn.className = "flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-white dark:bg-slate-700 shadow-sm text-primary-600 dark:text-white";
                    } else {
                        btn.className = "flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500";
                    }
                });
            }

            // 2. Atualizar apenas o subconteúdo para evitar o "pisca"
            const subContent = document.getElementById('dashboard-subcontent');
            if (subContent) {
                subContent.innerHTML = renderDashboardSubTab();
                lucide.createIcons();
                if (dashboardSubTab === 'geral' || dashboardSubTab === 'financeiro') {
                    setTimeout(initDashboardCharts, 50);
                }
            } else {
                renderDashboard();
            }
        }

        function initDashboardCharts() {
            const chartCashEl = document.getElementById('chart-cashflow');
            const chartPieEl = document.getElementById('chart-pie');
            
            if (dashboardSubTab === 'geral' && chartCashEl) {
                const ctxCash = chartCashEl.getContext('2d');
                
                // Agregação de dados reais dos últimos 6 meses
                const labels = [];
                const incomeData = [];
                const expenseData = [];
                
                const now = new Date();
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const monthStr = d.toISOString().substring(0, 7);
                    labels.push(d.toLocaleDateString('pt-BR', { month: 'short' }));
                    
                    const monthlyIn = appState.transactions
                        .filter(t => t.type === 'entrada' && t.date.startsWith(monthStr))
                        .reduce((acc, t) => acc + t.amount, 0);
                    
                    const monthlyOut = appState.transactions
                        .filter(t => t.type === 'saida' && t.date.startsWith(monthStr))
                        .reduce((acc, t) => acc + t.amount, 0);
                        
                    incomeData.push(monthlyIn);
                    expenseData.push(monthlyOut);
                }
                
                if (dashboardCharts.cash) dashboardCharts.cash.destroy();
                
                dashboardCharts.cash = new Chart(ctxCash, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Entradas',
                                data: incomeData,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3,
                                pointRadius: 4,
                                pointBackgroundColor: '#10b981'
                            },
                            {
                                label: 'Saídas',
                                data: expenseData,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3,
                                pointRadius: 4,
                                pointBackgroundColor: '#ef4444'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false },
                                ticks: { callback: value => formatCurrency(value).split(',')[0] }
                            },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            if (dashboardSubTab === 'financeiro' && chartPieEl) {
                const ctxPie = chartPieEl.getContext('2d');
                
                // Origem das Receitas por Categoria
                const currentMonth = new Date().toISOString().substring(0, 7);
                const incomeByCategory = {};
                
                appState.transactions
                    .filter(t => t.type === 'entrada' && t.date.startsWith(currentMonth))
                    .forEach(t => {
                        incomeByCategory[t.category] = (incomeByCategory[t.category] || 0) + t.amount;
                    });
                
                const pieLabels = Object.keys(incomeByCategory);
                const pieData = Object.values(incomeByCategory);
                
                if (dashboardCharts.pie) dashboardCharts.pie.destroy();

                dashboardCharts.pie = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: pieLabels.length > 0 ? pieLabels : ['Nenhuma'],
                        datasets: [{
                            data: pieData.length > 0 ? pieData : [1],
                            backgroundColor: ['#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'],
                            borderWidth: 2,
                            borderColor: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
                            hoverOffset: 15
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '75%',
                        plugins: { 
                            legend: { 
                                position: 'bottom',
                                labels: { 
                                    padding: 20,
                                    usePointStyle: true,
                                    font: { size: 10, weight: '600' }
                                } 
                            } 
                        }
                    }
                });
            }
        }

        function filterInventory() {
            const search = document.getElementById('inventory-search').value.toLowerCase();
            const cat = document.getElementById('inventory-filter-cat').value;
            
            const filtered = appState.inventory.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(search) || p.code.toLowerCase().includes(search);
                const matchesCat = cat === '' || p.category === cat;
                return matchesSearch && matchesCat;
            });

            document.getElementById('inventory-table-body').innerHTML = filtered.map(p => renderInventoryRow(p)).join('');
            lucide.createIcons();
        }

                                    <option value="raw" ${product?.type === 'raw' ? 'selected' : ''}>Matéria-Prima / Insumo</option>
                                    <option value="final" ${product?.type === 'final' ? 'selected' : ''}>Produto Acabado (Pré-moldado)</option>
                                </select>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium mb-1">Nome do Produto *</label>
                                <input type="text" id="p-name" required value="${product?.name || ''}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Código / SKU</label>
                                <input type="text" id="p-code" value="${product?.code || ''}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Categoria</label>
                                <select id="p-cat" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                                    ${appState.config.categories.map(c => `<option value="${c}" ${product?.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Preço de Custo (R$)</label>
                                <input type="number" step="0.01" id="p-cost" required value="${product?.costPrice || ''}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div id="p-sell-container" class="md:col-span-1 ${product?.type === 'raw' ? 'hidden' : ''}">
                                <label class="block text-sm font-medium mb-1">Preço de Venda (R$)</label>
                                <input type="number" step="0.01" id="p-sell" required value="${product?.sellPrice || ''}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div id="p-helper-container" class="md:col-span-1 ${product?.type === 'raw' ? 'hidden' : ''}">
                                <label class="block text-sm font-medium mb-1">Custo Ajudante Entrega (por unidade) (R$)</label>
                                <input type="number" step="0.01" id="p-helper" value="${product?.helperFee ?? 0}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Estoque Atual</label>
                                <input type="number" step="0.001" id="p-stock" required value="${product?.stock || 0}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Estoque Mínimo</label>
                                <input type="number" step="0.001" id="p-min" required value="${product?.minStock || 0}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Unidade</label>
                                <input type="text" id="p-unit" placeholder="ex: un, kg, m³" value="${product?.unit || 'un'}" class="w-full p-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                        </div>

                        <!-- Ficha Técnica (BOM) Section -->
                        <div id="recipe-section" class="${product?.type === 'final' ? '' : 'hidden'} mt-6 pt-6 border-t border-slate-100 dark:border-slate-700">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="font-bold flex items-center gap-2">
                                    <i data-lucide="clipboard-list" class="w-5 h-5 text-primary-600"></i>
                                    Ficha Técnica (Composição)
                                </h4>
                                <div id="recipe-total-cost" class="px-3 py-1 bg-primary-50 dark:bg-primary-900/20 text-primary-600 text-xs font-bold rounded-lg border border-primary-100 dark:border-primary-800">
                                    Custo Matéria-Prima: R$ 0,00
                                </div>
                            </div>
                            <div id="recipe-items" class="space-y-3 mb-4">
                                ${product?.recipe ? product.recipe.map((item, idx) => renderRecipeItem(item, idx, rawMaterials)).join('') : ''}
                            </div>
                            <div class="flex justify-between items-center">
                                <button type="button" onclick="addRecipeItem()" class="text-sm font-bold text-primary-600 flex items-center gap-1 hover:underline">
                                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar Insumo
                                </button>
                                <button type="button" id="btn-apply-cost" onclick="applyRecipeCost()" class="hidden text-[10px] bg-primary-600 text-white px-3 py-1.5 rounded-lg font-bold hover:brightness-95 active:scale-95 transition-all">
                                    Aplicar Custo Sugerido
                                </button>
                            </div>
                        </div>

                        <div class="flex justify-end gap-3 pt-6 border-t border-slate-100 dark:border-slate-700">
                            <button type="button" onclick="closeModal()" class="px-6 py-2 rounded-xl border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">Cancelar</button>
                            <button type="submit" class="px-6 py-2 rounded-xl bg-primary-600 text-white font-semibold hover:bg-primary-700 shadow-lg shadow-primary-500/20 transition-all active:scale-95">Salvar Produto</button>
                        </div>
                    </form>
                </div>
            `;
            openModal(html);
            toggleRecipeField(); // Garante visibilidade correta inicial
            
            document.getElementById('product-form').onsubmit = (e) => {
                e.preventDefault();
                
                // Collect recipe items
                const recipe = [];
                if (document.getElementById('p-type').value === 'final') {
                    document.querySelectorAll('.recipe-row').forEach(row => {
                        const mId = parseInt(row.querySelector('.recipe-material').value);
                        const mQty = parseFloat(row.querySelector('.recipe-qty').value);
                        if (mId && mQty) recipe.push({ productId: mId, qty: mQty });
                    });
                }

                const newProduct = {
                    id: product ? product.id : Date.now(),
                    type: document.getElementById('p-type').value,
                    name: document.getElementById('p-name').value,
                    code: document.getElementById('p-code').value,
                    category: document.getElementById('p-cat').value,
                    costPrice: parseFloat(document.getElementById('p-cost').value) || 0,
                    sellPrice: parseFloat(document.getElementById('p-sell').value) || 0,
                    helperFee: document.getElementById('p-type').value === 'final' ? (parseFloat(document.getElementById('p-helper').value) || 0) : 0,
                    stock: parseFloat(document.getElementById('p-stock').value) || 0,
                    minStock: parseFloat(document.getElementById('p-min').value) || 0,
                    unit: document.getElementById('p-unit').value,
                    recipe: recipe.length > 0 ? recipe : null
                };

                if (product) {
                    const idx = appState.inventory.findIndex(p => p.id === productId);
                    appState.inventory[idx] = newProduct;
                } else {
                    appState.inventory.push(newProduct);
                }
                
                saveData();
                closeModal();
                renderEstoque();
                showToast(product ? 'Produto atualizado!' : 'Produto cadastrado!');
            };
        }

        function toggleRecipeField() {
            const type = document.getElementById('p-type').value;
            const recipeSection = document.getElementById('recipe-section');
            const sellContainer = document.getElementById('p-sell-container');
            const helperContainer = document.getElementById('p-helper-container');
            
            recipeSection.classList.toggle('hidden', type !== 'final');
            sellContainer.classList.toggle('hidden', type === 'raw');
            helperContainer.classList.toggle('hidden', type === 'raw');
            
            if (type === 'raw') {
                document.getElementById('p-sell').value = 0;
                document.getElementById('p-helper').value = 0;
            }
        }

        function renderRecipeItem(item = null, idx = 0, materials = []) {
            const safeMaterials = materials.length > 0 ? materials : appState.inventory.filter(p => p.type === 'raw');
            return `
                <div class="recipe-row flex gap-3 items-end animate-fade-in">
                    <div class="flex-1">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Insumo</label>
                        <select class="recipe-material w-full p-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none text-sm">
                            <option value="">Selecione...</option>
                            ${safeMaterials.map(m => `<option value="${m.id}" ${item?.productId === m.id ? 'selected' : ''}>${m.name} (${m.unit})</option>`).join('')}
                        </select>
                    </div>
                    <div class="w-32">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Qtd p/ Unidade</label>
                        <input type="number" step="0.001" class="recipe-qty w-full p-2 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg outline-none text-sm" value="${item?.qty || ''}">
                    </div>
                    <button type="button" onclick="this.parentElement.remove()" class="p-2.5 text-slate-400 hover:text-danger">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
        }

        function addRecipeItem() {
            const container = document.getElementById('recipe-items');
            const div = document.createElement('div');
            div.innerHTML = renderRecipeItem();
            container.appendChild(div.firstElementChild);
            lucide.createIcons();
            
            // Add listeners to new items for cost calculation
            const lastRow = container.lastElementChild;
            lastRow.querySelector('.recipe-material').onchange = calculateRecipeCost;
            lastRow.querySelector('.recipe-qty').oninput = calculateRecipeCost;
        }

        let lastCalculatedCost = 0;

        function calculateRecipeCost() {
            let totalCost = 0;
            document.querySelectorAll('.recipe-row').forEach(row => {
                const mId = parseInt(row.querySelector('.recipe-material').value);
                const mQty = parseFloat(row.querySelector('.recipe-qty').value) || 0;
                if (mId) {
                    const material = appState.inventory.find(m => m.id === mId);
                    if (material) {
                        totalCost += (material.costPrice * mQty);
                    }
                }
            });

            lastCalculatedCost = totalCost;
            const display = document.getElementById('recipe-total-cost');
            const btnApply = document.getElementById('btn-apply-cost');
            
            if (display) {
                display.innerText = `Custo Matéria-Prima: ${formatCurrency(totalCost)}`;
                if (totalCost > 0) {
                    display.classList.add('bg-success/10', 'text-success', 'border-success/20');
                    display.classList.remove('bg-primary-50', 'text-primary-600', 'border-primary-100');
                    btnApply.classList.remove('hidden');
                } else {
                    display.classList.remove('bg-success/10', 'text-success', 'border-success/20');
                    display.classList.add('bg-primary-50', 'text-primary-600', 'border-primary-100');
                    btnApply.classList.add('hidden');
                }
            }
        }

        function applyRecipeCost() {
            const costInput = document.getElementById('p-cost');
            if (costInput && lastCalculatedCost > 0) {
                costInput.value = lastCalculatedCost.toFixed(2);
                showToast('Custo de fabricação aplicado!');
            }
        }

        function deleteProduct(id) {
            if (confirm('Deseja realmente excluir este produto?')) {
                appState.inventory = appState.inventory.filter(p => p.id !== id);
                saveData();
                renderEstoque();
                showToast('Produto excluído.', 'error');
            }
        }

        function editProduct(id) {
            openProductModal(id);
        }

        // --- CASH FLOW RENDER ---
        function renderCaixa() {
            const balance = appState.transactions.reduce((acc, t) => acc + (t.type === 'entrada' ? t.amount : -t.amount), 0);
            const totalIn = appState.transactions.filter(t => t.type === 'entrada').reduce((acc, t) => acc + t.amount, 0);
            const totalOut = appState.transactions.filter(t => t.type === 'saida').reduce((acc, t) => acc + t.amount, 0);
            const showBalance = appState.config.showBalance;

            let html = `
                <div class="max-w-md mx-auto sm:max-w-none px-1">
                    <!-- 1. TOPO DA TELA (SALDO ESTILO FINTECH) -->
                    <div class="mb-6 p-6 bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 text-center animate-fade-in">
                        <p class="text-slate-500 dark:text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Saldo do Caixa</p>
                        <div class="flex items-center justify-center gap-3">
                            <h2 class="text-2xl sm:text-4xl font-black text-slate-900 dark:text-white tracking-tight break-all">
                                ${showBalance ? formatCurrency(balance) : '••••••'}
                            </h2>
                            <button onclick="toggleBalanceVisibility(); renderCaixa();" class="p-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 rounded-full transition-all shrink-0">
                                <i data-lucide="${showBalance ? 'eye-off' : 'eye'}" class="w-4 h-4 text-slate-600 dark:text-slate-300"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 2. BOTÕES DE AÇÃO PRINCIPAIS (MAIS PEQUENOS) -->
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <button onclick="openTransactionModal('entrada')" class="flex flex-col items-center gap-1.5 p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:border-success/50 transition-all active:scale-95 group">
                            <div class="w-10 h-10 bg-green-50 dark:bg-green-900/20 text-green-600 rounded-xl flex items-center justify-center group-hover:bg-green-600 group-hover:text-white transition-all">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                            </div>
                            <span class="text-[9px] font-black uppercase text-slate-500 dark:text-slate-400">Receita</span>
                        </button>
                        <button onclick="openTransactionModal('saida')" class="flex flex-col items-center gap-1.5 p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:border-danger/50 transition-all active:scale-95 group">
                            <div class="w-10 h-10 bg-red-50 dark:bg-red-900/20 text-red-600 rounded-xl flex items-center justify-center group-hover:bg-red-600 group-hover:text-white transition-all">
                                <i data-lucide="minus" class="w-5 h-5"></i>
                            </div>
                            <span class="text-[9px] font-black uppercase text-slate-500 dark:text-slate-400">Despesa</span>
                        </button>
                        <button onclick="renderContasFixas()" class="flex flex-col items-center gap-1.5 p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 hover:border-primary-500/50 transition-all active:scale-95 group">
                            <div class="w-10 h-10 bg-primary-50 dark:bg-primary-900/20 text-primary-600 rounded-xl flex items-center justify-center group-hover:bg-primary-600 group-hover:text-white transition-all">
                                <i data-lucide="calendar" class="w-5 h-5"></i>
                            </div>
                            <span class="text-[9px] font-black uppercase text-slate-500 dark:text-slate-400 text-center">Contas</span>
                        </button>
                    </div>

                    <!-- 3. INDICADORES FINANCEIROS -->
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 min-w-0">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">Entradas</p>
                            <p class="text-base font-bold text-green-600 truncate">${formatCurrency(totalIn)}</p>
                        </div>
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 min-w-0">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 truncate">Saídas</p>
                            <p class="text-base font-bold text-red-600 truncate">${formatCurrency(totalOut)}</p>
                        </div>
                    </div>

                    <!-- 4. LISTA DE MOVIMENTAÇÕES (LIMITADO A 5) -->
                    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                            <h3 class="text-xs font-black text-slate-900 dark:text-white uppercase tracking-tighter">Últimas Movimentações</h3>
                            <button onclick="filterCashModal()" class="p-1.5 bg-slate-50 dark:bg-slate-700 rounded-lg hover:bg-slate-100 transition-all">
                                <i data-lucide="filter" class="w-3.5 h-3.5 text-slate-500"></i>
                            </button>
                        </div>
                        
                        <div class="divide-y divide-slate-50 dark:divide-slate-700/50">
                            ${appState.transactions.slice().reverse().slice(0, 5).map(t => renderFintechRow(t)).join('')}
                        </div>
                        
                        ${appState.transactions.length > 5 ? `
                            <button onclick="renderExtratoCompleto()" class="w-full py-4 text-[10px] font-black text-primary-600 uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-all border-t border-slate-50 dark:border-slate-700/50">
                                Ver Extrato Completo
                            </button>
                        ` : ''}

                        ${appState.transactions.length === 0 ? `
                            <div class="p-12 text-center">
                                <div class="w-12 h-12 bg-slate-50 dark:bg-slate-700 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                                    <i data-lucide="receipt" class="w-6 h-6"></i>
                                </div>
                                <p class="text-xs text-slate-400 italic">Nenhuma movimentação.</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            document.getElementById('content-area').innerHTML = html;
            lucide.createIcons();
        }

        function openFullStatementModal() {
            let html = `
                <div class="flex flex-col h-[80vh]">
                    <div class="p-6 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center shrink-0">
                        <h3 class="text-xl font-black dark:text-white uppercase tracking-tighter">Extrato Completo</h3>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                            <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-2">
                        <div class="divide-y divide-slate-50 dark:divide-slate-700/50 bg-white dark:bg-slate-800 rounded-2xl overflow-hidden">
                            ${appState.transactions.slice().reverse().map(t => renderFintechRow(t)).join('')}
                        </div>
                    </div>
                </div>
            `;
            openModal(html);
        }

        function renderFintechRow(t) {
            const isEntry = t.type === 'entrada';
            const dateObj = new Date(t.date + 'T12:00:00');
            const day = dateObj.getDate().toString().padStart(2, '0');
            const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');

            return `
                <div onclick="openTransactionDetails(${t.id})" class="p-4 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-all cursor-pointer group active:bg-slate-100">
                    <div class="flex items-center gap-4 min-w-0">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center shrink-0 ${isEntry ? 'bg-green-50 dark:bg-green-900/20 text-green-600' : 'bg-red-50 dark:bg-red-900/20 text-red-600'}">
                            <i data-lucide="${isEntry ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5"></i>
                        </div>
                        <div class="min-w-0">
                            <h4 class="text-sm font-bold text-slate-900 dark:text-white truncate uppercase tracking-tight">${t.description}</h4>
                            <p class="text-[10px] text-slate-500 font-medium uppercase">${t.category} • ${day}/${month}</p>
                        </div>
                    </div>
                    <div class="text-right shrink-0">
                        <p class="text-sm font-black ${isEntry ? 'text-green-600' : 'text-red-600'}">
                            ${isEntry ? '+' : '-'} ${formatCurrency(t.amount)}
                        </p>
                    </div>
                </div>
            `;
        }

        function openTransactionDetails(id) {
            const t = appState.transactions.find(x => x.id === id);
            if (!t) return;

            const isEntry = t.type === 'entrada';
            
            let html = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-lg font-black dark:text-white uppercase tracking-tighter">Detalhes do Lançamento</h3>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-all">
                            <i data-lucide="x" class="w-5 h-5 text-slate-400"></i>
                        </button>
                    </div>

                    <div class="text-center mb-8">
                        <div class="w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 ${isEntry ? 'bg-green-50 dark:bg-green-900/20 text-green-600' : 'bg-red-50 dark:bg-red-900/20 text-red-600'}">
                            <i data-lucide="${isEntry ? 'arrow-down-left' : 'arrow-up-right'}" class="w-8 h-8"></i>
                        </div>
                        <h2 class="text-3xl font-black ${isEntry ? 'text-green-600' : 'text-red-600'} mb-1">
                            ${isEntry ? '+' : '-'} ${formatCurrency(t.amount)}
                        </h2>
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">${isEntry ? 'Receita' : 'Despesa'}</p>
                    </div>

                    <div class="space-y-4 mb-8">
                        <div class="bg-slate-50 dark:bg-slate-700/50 p-4 rounded-2xl flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase">Descrição</span>
                            <span class="text-sm font-black text-slate-900 dark:text-white uppercase text-right ml-4">${t.description}</span>
                        </div>
                        <div class="bg-slate-50 dark:bg-slate-700/50 p-4 rounded-2xl flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase">Data</span>
                            <span class="text-sm font-black text-slate-900 dark:text-white uppercase">${formatDate(t.date)}</span>
                        </div>
                        <div class="bg-slate-50 dark:bg-slate-700/50 p-4 rounded-2xl flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase">Categoria</span>
                            <span class="text-sm font-black text-slate-900 dark:text-white uppercase">${t.category}</span>
                        </div>

        function filterFullStatement() {
            const search = document.getElementById('statement-search').value.toLowerCase();
            const start = document.getElementById('statement-start').value;
            const end = document.getElementById('statement-end').value;
            const type = document.getElementById('statement-type').value;

            const filtered = appState.transactions.filter(t => {
                const matchesSearch = t.description.toLowerCase().includes(search) || t.category.toLowerCase().includes(search);
                const matchesDate = (!start || t.date >= start) && (!end || t.date <= end);
                const matchesType = !type || t.type === type;
                return matchesSearch && matchesDate && matchesType;
            });

            const container = document.getElementById('full-statement-list');
            if (container) {
                container.innerHTML = filtered.slice().reverse().map(t => renderFintechRow(t)).join('') || 
                    '<div class="p-12 text-center text-slate-400 italic">Nenhum lançamento encontrado.</div>';
                lucide.createIcons();
            }
        }

                            return `
                                <div class="bg-white dark:bg-slate-800 p-4 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col gap-4 animate-fade-in">

                                        <div class="flex items-center gap-3">

                                                <i data-lucide="check" class="w-3.5 h-3.5"></i> Pago este mês
                                            </div>

                                            <button onclick="payFixedAccount(${acc.id})" class="flex-1 py-2.5 ${isOverdue ? 'bg-red-600' : 'bg-primary-600'} text-white text-[10px] font-black rounded-xl uppercase shadow-lg active:scale-95 transition-all">
                                                Confirmar Pagamento
                                            </button>
                                        `}
                                        
                                        <button onclick="openFixedAccountModal(${acc.id})" class="p-2.5 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl hover:bg-primary-500 hover:text-white transition-all">
                                            <i data-lucide="edit-3" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="deleteFixedAccount(${acc.id})" class="p-2.5 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl hover:bg-danger hover:text-white transition-all">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>

                    description: document.getElementById('fa-desc').value,

                    dueDay: parseInt(document.getElementById('fa-day').value),
                    category: document.getElementById('fa-cat').value
                };

                if (acc) {
                    // Atualizar existente
                    Object.assign(acc, data);
                    showToast('Conta fixa atualizada!');
                } else {
                    // Criar nova
                    appState.fixedAccounts.push({
                        id: Date.now(),

                saveData();

        function payFixedAccount(id) {
            const acc = appState.fixedAccounts.find(a => a.id === id);
            if (!acc) return;

            if (confirm(`Deseja lançar o pagamento de ${formatCurrency(acc.amount)} para "${acc.description}"?`)) {
                const trans = {
                    id: Date.now(),
                    type: 'saida',
                    description: `Pagamento Fixo: ${acc.description}`,
                    amount: acc.amount,
                    date: new Date().toISOString().split('T')[0],
                    category: acc.category,
                    account: 'Caixa Principal',
                    paymentMethod: 'PIX' // Default
                };
                
                appState.transactions.push(trans);
                saveData();
                renderContasFixas();
                showToast('Pagamento registrado no caixa!');
            }
        }

        function deleteFixedAccount(id) {
            if (confirm('Deseja excluir esta conta fixa? (Isso não removerá os pagamentos já lançados no caixa)')) {
                appState.fixedAccounts = appState.fixedAccounts.filter(a => a.id !== id);
                saveData();
                renderContasFixas();
                showToast('Conta fixa removida.', 'error');
            }
        }

        function applyCashFilter() {
            const search = document.getElementById('filter-search').value.toLowerCase();
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const type = document.getElementById('filter-type').value;

            const filtered = appState.transactions.filter(t => {
                const matchesSearch = !search || t.description.toLowerCase().includes(search) || t.category.toLowerCase().includes(search);
                const matchesType = type === '' || t.type === type;
                const matchesDate = (!start || t.date >= start) && (!end || t.date <= end);
                return matchesSearch && matchesType && matchesDate;
            });

            closeModal();
            renderCaixaFiltered(filtered);
        }

        function renderCaixaFiltered(transactions) {
            renderCaixa(); // Reset layout base
            const container = document.querySelector('.divide-y');
            if (container) {
                container.innerHTML = transactions.slice().reverse().map(t => renderFintechRow(t)).join('') || 
                    '<div class="p-12 text-center text-slate-400 italic">Nenhuma movimentação para este filtro.</div>';
                lucide.createIcons();
            }
        }

        function openPaymentClosingModal(id) {
            const emp = appState.employees.find(e => e.id === id);
            const advances = (emp.history || []).filter(h => h.type === 'vale');
            const totalAdvances = advances.reduce((acc, h) => acc + h.amount, 0);
            const netAmount = emp.salary - totalAdvances;

            let html = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold dark:text-white">Fechar Pagamento - ${emp.name}</h3>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-100 dark:border-slate-700">
                            <span class="text-slate-500 font-medium">Salário Base (${emp.payCycle})</span>
                            <span class="font-bold dark:text-white">${formatCurrency(emp.salary)}</span>
                        </div>
                        <div class="flex justify-between p-3 bg-orange-50 dark:bg-orange-900/10 rounded-xl border border-orange-100 dark:border-orange-800">
                            <span class="text-orange-600 font-medium">(-) Total de Vales</span>
                            <span class="font-bold text-orange-600">-${formatCurrency(totalAdvances)}</span>
                        </div>
                        <div class="flex justify-between p-4 bg-green-50 dark:bg-green-900/20 rounded-xl border-2 border-green-200 dark:border-green-800">
                            <span class="text-green-700 font-black text-lg">LÍQUIDO A PAGAR</span>
                            <span class="text-green-700 font-black text-xl">${formatCurrency(netAmount)}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="closeModal()" class="py-3 rounded-xl border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">Cancelar</button>
                        <button id="btn-confirm-pay" class="py-3 rounded-xl bg-green-600 text-white font-bold hover:brightness-95 shadow-lg shadow-green-500/20 transition-all">Confirmar Pagamento</button>
                    </div>
                </div>
            `;
            openModal(html);

            document.getElementById('btn-confirm-pay').onclick = () => {
                const date = new Date().toISOString().split('T')[0];

                // 1. Record final payment in history
                emp.history.push({
                    id: Date.now(),
                    type: 'pagamento',
                    amount: netAmount,
                    date: date,
                    description: `Fechamento Salário ${emp.payCycle}`
                });

                // 2. Clear current advances (they are now settled)
                // We mark them as 'settled' or just filter them out for the next balance calculation
                // Let's change their type so they don't count for the NEXT balance
                emp.history.forEach(h => {
                    if (h.type === 'vale') h.type = 'vale_pago';
                });

                // 3. Record in Cash Flow
                appState.transactions.push({
                    id: Date.now() + 1,
                    type: 'saida',
                    category: 'Folha de Pagamento',
                    amount: netAmount,
                    date: date,
                    description: `PAGTO SALÁRIO: ${emp.name} (${emp.payCycle})`,
                    account: 'Caixa Principal',
                    paymentMethod: 'PIX'
                });

                saveData();
                closeModal();
                renderFuncionarios();
                showToast(`Pagamento de ${formatCurrency(netAmount)} realizado!`);
            };
        }

            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            let resetDateStr = appState.config.breakEvenResetDate || currentMonth + '-01';
            const resetDate = new Date(resetDateStr);
            let endDate = new Date(resetDate);
            endDate.setDate(resetDate.getDate() + 29);
            let endDateStr = endDate.toISOString().split('T')[0];
            let daysElapsed = Math.floor((new Date(todayStr) - resetDate) / (1000 * 60 * 60 * 24)) + 1;
            if (daysElapsed > 30) {
                appState.config.breakEvenResetDate = todayStr;
                saveData();
                resetDateStr = todayStr;
                const nd = new Date(resetDateStr);

                endDate.setDate(nd.getDate() + 29);
