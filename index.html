        body {

        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

            background: transparent;
        }

        .glass {

        .dark .glass {

        .modal-enter {

        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 300ms, transform 300ms;

        /* Toast notifications */
        #toast-container {

            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        /* Print Styles */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            #sidebar, header, #toast-container, button, .no-print {

            }
            #main-app {

                height: auto !important;
                overflow: visible !important;
            }
            main {
                margin: 0 !important;
                padding: 0 !important;
                height: auto !important;
                overflow: visible !important;
            }
            #content-area {
                padding: 0 !important;
                overflow: visible !important;
            }
            /* Garantir que o modal de relatório ocupe a página toda se estiver aberto */
            #modal-backdrop {
                position: absolute !important;
                background: white !important;
                padding: 0 !important;
                display: block !important;
            }
            #modal-content {
                box-shadow: none !important;
                max-width: none !important;
                max-height: none !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                border: none !important;
            }
            .rounded-2xl, .rounded-3xl, .rounded-xl {
                border-radius: 0 !important;
            }
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-2xl {
                box-shadow: none !important;
            }
            /* Forçar cores de fundo na impressão para manter a legibilidade dos cards */
            .bg-slate-50, .bg-slate-100 {
                background-color: #f8fafc !important;

            }
            .bg-primary-50 {
                background-color: #f0f9ff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            table {
                page-break-inside: auto;
            }
            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
        }

        /**
         * Gerencia o ciclo de 30 dias do ponto de equilíbrio.
         * Retorna as informações do ciclo atual e realiza o reset automático se necessário.
         */
        function getBreakEvenConfig() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const currentMonth = todayStr.substring(0, 7);
            
            if (!appState.config) appState.config = {};
            
            // Inicializa se não existir
            if (!appState.config.breakEvenResetDate) {
                appState.config.breakEvenResetDate = currentMonth + '-01';
                saveData();
            }

            // Cálculo robusto de dias passados usando UTC
            const [y1, m1, d1] = appState.config.breakEvenResetDate.split('-').map(Number);
            const [y2, m2, d2] = todayStr.split('-').map(Number);
            
            const date1 = Date.UTC(y1, m1 - 1, d1);
            const date2 = Date.UTC(y2, m2 - 1, d2);
            
            const diffTime = date2 - date1;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            let daysElapsed = diffDays + 1;

            // Se passou de 30 dias, reinicia o ciclo
            if (daysElapsed > 30) {
                appState.config.breakEvenResetDate = todayStr;
                saveData();
                daysElapsed = 1;
            }

            const resetDateStr = appState.config.breakEvenResetDate;
            
            // Calcula a data final do ciclo (reset + 29 dias)
            const rObj = new Date(resetDateStr + 'T00:00:00Z');
            const endObj = new Date(rObj);
            endObj.setUTCDate(rObj.getUTCDate() + 29);
            const endDateStr = endObj.toISOString().split('T')[0];

            return {
                resetDateStr,
                endDateStr,
                daysElapsed,
                todayStr
            };
        }

        function renderProducao() {
            // Cálculo de Produção (Sincronizado com Ponto de Equilíbrio)
            const { resetDateStr, daysElapsed } = getBreakEvenConfig();
            
            const monthlyProductionMap = new Map();
            appState.production.filter(p => p.date >= resetDateStr).forEach(p => {
                const name = p.productName || 'Produto';
                monthlyProductionMap.set(name, (monthlyProductionMap.get(name) || 0) + p.qty);
            });
            const monthlyProduction = Array.from(monthlyProductionMap.entries())
                .map(([name, qty]) => ({ name, qty }))
                .sort((a, b) => b.qty - a.qty);
            
            const totalMonthly = monthlyProduction.reduce((acc, p) => acc + p.qty, 0);

            // Cálculo de Necessidade de Produção (PCP)
            const pcpNeeds = {};
            appState.sales.filter(s => s.status === 'pending').forEach(sale => {
                sale.items.forEach(item => {
                    if (!pcpNeeds[item.productId]) {
                        pcpNeeds[item.productId] = {
                            name: item.name,
                            needed: 0,
                            stock: 0
                        };
                    }
                    pcpNeeds[item.productId].needed += (item.isMeter ? (item.units || 0) : item.qty);
                });
            });

            // Cruzar com estoque atual
            const pcpAlerts = [];
            Object.keys(pcpNeeds).forEach(id => {
                const product = appState.inventory.find(p => p.id == id);
                if (product) {
                    pcpNeeds[id].stock = product.stock;
                    const short = pcpNeeds[id].needed - product.stock;
                    if (short > 0) {
                        pcpAlerts.push({
                            id: id,
                            name: pcpNeeds[id].name,
                            needed: pcpNeeds[id].needed,
                            stock: product.stock,
                            toProduce: short
                        });
                    }
                }
            });

            let html = `

                    <div>
                        <h2 class="text-2xl font-bold dark:text-white">Produção</h2>
                        <p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Gestão de Fabricação Diária</p>
                    </div>
                    <button onclick="openProductionModal()" class="w-full sm:w-auto bg-primary-600 hover:bg-primary-700 text-white px-6 py-4 sm:py-2.5 rounded-2xl flex items-center justify-center gap-2 font-black transition-all shadow-lg shadow-primary-500/20 uppercase text-xs tracking-widest">
                        <i data-lucide="plus" class="w-5 h-5"></i> Registrar Produção
                    </button>
                </div>

                <!-- Painel PCP (Planejamento e Controle de Produção) -->
                ${pcpAlerts.length > 0 ? `
                    <div class="mb-6 p-4 sm:p-6 bg-orange-50 dark:bg-orange-900/10 border border-orange-200 dark:border-orange-800 rounded-3xl animate-fade-in shadow-sm">
                        <h4 class="font-black text-[10px] text-orange-800 dark:text-orange-300 flex items-center gap-2 mb-4 uppercase tracking-widest">
                            <i data-lucide="factory" class="w-4 h-4"></i>
                            Necessidade para Pedidos Pendentes
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            ${pcpAlerts.map(alert => `
                                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-orange-100 dark:border-orange-800/50 flex flex-col">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="text-sm font-black text-slate-900 dark:text-white uppercase tracking-tighter">${alert.name}</span>
                                        <span class="px-2 py-0.5 bg-orange-100 text-orange-700 text-[8px] font-black rounded-full uppercase">Falta</span>
                                    </div>
                                    <div class="flex justify-between text-[10px] mb-4">
                                        <span class="text-slate-500 uppercase font-bold">Pedidos: <b class="text-slate-900 dark:text-white">${alert.needed}</b></span>
                                        <span class="text-slate-500 uppercase font-bold">Estoque: <b class="text-slate-900 dark:text-white">${alert.stock}</b></span>
                                    </div>
                                    <button onclick="openProductionModal(${alert.id}, ${alert.toProduce})" class="w-full py-3 bg-orange-500 hover:bg-orange-600 text-white text-[10px] font-black rounded-xl transition-all flex items-center justify-center gap-2 uppercase tracking-widest active:scale-95">
                                        PRODUZIR ${alert.toProduce} AGORA
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : `
                    <div class="mb-6 p-4 bg-green-50 dark:bg-green-900/10 border border-green-100 dark:border-green-800 rounded-3xl flex items-center gap-3 shadow-sm animate-fade-in">
                        <div class="bg-green-100 dark:bg-green-900/40 p-2 rounded-full text-green-600">
                            <i data-lucide="check-circle" class="w-5 h-5"></i>
                        </div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-green-800 dark:text-green-300">Estoque em dia para todos os pedidos!</p>
                    </div>
                `}

                <!-- Painel de Resumo Mensal de Produção -->
                <div class="mb-6 bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-700/30 flex justify-between items-center">
                        <h4 class="font-black text-[10px] uppercase tracking-widest text-slate-500 flex items-center gap-2">
                            <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
                            Produção no Ciclo (Dia ${daysElapsed}/30)
                        </h4>
                        <span class="text-[10px] font-black text-primary-600 bg-primary-50 dark:bg-primary-900/20 px-3 py-1 rounded-full uppercase tracking-tighter">Total: ${totalMonthly} un</span>
                    </div>
                    <div class="p-4 sm:p-6">
                        ${monthlyProduction.length > 0 ? `
                            <div class="space-y-4">
                                ${monthlyProduction.map((p, index) => {
                                    const percentage = totalMonthly > 0 ? (p.qty / totalMonthly * 100).toFixed(0) : 0;
                                    const colors = [
                                        'bg-primary-500', 'bg-emerald-500', 'bg-amber-500', 
                                        'bg-rose-500', 'bg-violet-500', 'bg-cyan-500'
                                    ];
                                    const color = colors[index % colors.length];
                                    
                                    return `
                                        <div class="relative">
                                            <div class="flex justify-between items-center mb-1.5">
                                                <div class="flex items-center gap-3">
                                                    <div class="w-6 h-6 rounded-lg ${index === 0 ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 dark:bg-slate-700 text-slate-500'} flex items-center justify-center text-[10px] font-black">
                                                        ${index + 1}º
                                                    </div>
                                                    <span class="text-xs font-black text-slate-700 dark:text-slate-200 uppercase tracking-tighter">${p.name}</span>
                                                </div>
                                                <div class="text-right">
                                                    <span class="text-xs font-black text-slate-900 dark:text-white">${p.qty} <span class="text-[9px] text-slate-400 uppercase">un</span></span>
                                                    <span class="text-[9px] font-bold text-slate-400 ml-2">${percentage}%</span>
                                                </div>
                                            </div>
                                            <div class="w-full h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                                                <div class="h-full ${color} rounded-full transition-all duration-500" style="width: ${percentage}%"></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : `
                            <div class="text-center py-4">
                                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest italic">Nenhuma produção registrada ainda.</p>
                            </div>
                        `}
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">
                        <h4 class="font-black text-xs uppercase tracking-widest text-slate-400">Histórico de Produção</h4>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <input type="date" id="prod-filter-start" onchange="filterProduction()" class="flex-1 sm:w-auto bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold p-3 outline-none focus:ring-2 focus:ring-primary-500 shadow-sm">
                            <input type="date" id="prod-filter-end" onchange="filterProduction()" class="flex-1 sm:w-auto bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold p-3 outline-none focus:ring-2 focus:ring-primary-500 shadow-sm">
                        </div>
                    </div>
                    
                    <div id="production-history-list" class="space-y-3">
                        <!-- Preenchido via filterProduction -->
                    </div>
                </div>
            `;
            document.getElementById('content-area').innerHTML = html;
            try {
                lucide.createIcons();
            } catch (_) {
            }
            filterProduction();
        }

        function filterProduction() {
            const start = document.getElementById('prod-filter-start').value;
            const end = document.getElementById('prod-filter-end').value;

            const filtered = appState.production.filter(p => {
                const matchesDate = (!start || p.date >= start) && (!end || p.date <= end);
                return matchesDate;
            });

            const container = document.getElementById('production-history-list');
            if (!container) return;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="py-12 text-center bg-white dark:bg-slate-800 rounded-3xl border border-dashed border-slate-200 dark:border-slate-700">
                        <i data-lucide="history" class="w-12 h-12 text-slate-200 mx-auto mb-3"></i>
                        <p class="text-sm text-slate-400 font-bold uppercase tracking-widest">Nenhum registro encontrado</p>
                    </div>
                `;
            } else {
                container.innerHTML = filtered.slice(-30).reverse().map(p => `
                    <div class="bg-white dark:bg-slate-800 p-4 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm animate-fade-in">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">${formatDate(p.date)}</p>
                                <h5 class="text-sm font-black text-slate-900 dark:text-white uppercase tracking-tighter">${p.productName}</h5>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-primary-600 tracking-tighter">${p.qty} <span class="text-[10px] uppercase">un</span></p>
                                <button onclick="deleteProduction(${p.id})" class="mt-1 p-2 text-slate-300 hover:text-danger transition-colors">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="pt-3 border-t border-slate-50 dark:border-slate-700/50">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Materiais Consumidos:</p>
                            <div class="flex flex-wrap gap-1.5">
                                ${p.materials.map(m => `
                                    <span class="text-[9px] font-bold px-2.5 py-1 bg-slate-50 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300 rounded-full border border-slate-100 dark:border-slate-600">
                                        ${m.name}: <b class="text-slate-900 dark:text-white">${m.qty.toFixed(2)}</b>
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            
            try {
                lucide.createIcons();
            } catch (_) {
            }
        }

        function openProductionModal(preSelectedId = null, preSelectedQty = null) {
            const finalProducts = appState.inventory.filter(p => p.type === 'final');
            
            let html = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black text-slate-900 dark:text-white uppercase tracking-tighter">Registrar Produção</h3>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <form id="production-form" class="space-y-5">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5">Produto a Fabricar</label>
                            <select id="prod-product" required class="w-full p-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary-500 font-bold text-sm appearance-none">
                                <option value="">Selecione o pré-moldado...</option>
                                ${finalProducts.map(p => `<option value="${p.id}" ${preSelectedId == p.id ? 'selected' : ''}>${p.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5">Quantidade Fabricada</label>
                                <input type="number" id="prod-qty" required min="1" value="${preSelectedQty || ''}" placeholder="0" class="w-full p-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary-500 font-black text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1.5">Data da Produção</label>
                                <input type="date" id="prod-date" required value="${new Date().toISOString().split('T')[0]}" class="w-full p-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary-500 font-bold text-sm">
                            </div>
                        </div>
                        
                        <div id="recipe-preview" class="p-5 bg-primary-50 dark:bg-primary-900/10 rounded-3xl border border-primary-100 dark:border-primary-900/30 hidden">
                            <h5 class="text-[10px] font-black text-primary-700 dark:text-primary-300 uppercase tracking-widest mb-3 flex items-center gap-2">
                                <i data-lucide="info" class="w-4 h-4"></i>
                                Consumo de Matéria-Prima:
                            </h5>
                            <ul id="recipe-list" class="space-y-2"></ul>
                        </div>

                        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700">
                            <button type="button" onclick="closeModal()" class="w-full sm:w-auto px-6 py-4 sm:py-2.5 rounded-2xl border border-slate-200 dark:border-slate-700 font-black text-xs uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Cancelar</button>
                            <button type="submit" class="w-full sm:w-auto px-6 py-4 sm:py-2.5 rounded-2xl bg-success text-white font-black text-xs uppercase tracking-widest hover:brightness-95 shadow-lg shadow-success/20 transition-all active:scale-95">Confirmar Produção</button>
                        </div>
                    </form>
                </div>
            `;
            openModal(html);

            const select = document.getElementById('prod-product');
            const qtyInput = document.getElementById('prod-qty');
            
            const updatePreview = () => {
                const pId = parseInt(select.value);
                const qty = parseInt(qtyInput.value) || 0;
                const product = appState.inventory.find(p => p.id === pId);
                const previewDiv = document.getElementById('recipe-preview');
                const list = document.getElementById('recipe-list');

                if (product && product.recipe && qty > 0) {
                    previewDiv.classList.remove('hidden');
                    list.innerHTML = product.recipe.map(item => {
                        const material = appState.inventory.find(m => m.id === item.productId);
                        const totalNeeded = item.qty * qty;
                        const isShort = material.stock < totalNeeded;
                        return `
                            <li class="flex justify-between items-center ${isShort ? 'text-danger' : 'text-slate-600 dark:text-slate-400'}">
                                <span class="text-xs font-bold uppercase tracking-tight">${material.name}</span>
                                <span class="text-xs font-black ${isShort ? 'text-danger' : 'text-slate-900 dark:text-white'}">
                                    ${totalNeeded.toFixed(2)} ${material.unit}
                                    ${isShort ? '<br><span class="text-[8px] uppercase tracking-tighter">Estoque Insuficiente!</span>' : ''}
                                </span>
                            </li>
                        `;
                    }).join('');
                } else {
                    previewDiv.classList.add('hidden');
                }
            };

            select.onchange = updatePreview;
            qtyInput.oninput = updatePreview;
            
            // Run preview immediately if pre-selected
            if (preSelectedId && preSelectedQty) {
                updatePreview();
            }

            document.getElementById('production-form').onsubmit = (e) => {
                e.preventDefault();
                const pId = parseInt(select.value);
                const qty = parseInt(qtyInput.value);
                const date = document.getElementById('prod-date').value;
                const product = appState.inventory.find(p => p.id === pId);

                if (!product) {
                    showToast('Selecione um produto.', 'error');
                    return;
                }

                // Check stock for all materials first
                let stockOk = true;
                product.recipe.forEach(item => {
                    const material = appState.inventory.find(m => m.id === item.productId);
                    if (material.stock < (item.qty * qty)) stockOk = false;
                });

                if (!stockOk) {
                    showToast('Estoque de matéria-prima insuficiente!', 'error');
                    return;
                }

                // 1. Record materials used for history
                const usedMaterials = product.recipe.map(item => {
                    const material = appState.inventory.find(m => m.id === item.productId);
                    const totalUsed = item.qty * qty;
                    material.stock -= totalUsed; // 2. Deduct from stock
                    return { productId: material.id, name: material.name, qty: totalUsed };
                });

                // 3. Add to finished product stock
                product.stock += qty;

                // 4. Save Production Record
                appState.production.push({
                    id: Date.now(),
                    productId: pId,
                    productName: product.name,
                    qty: qty,
                    date: date,
                    materials: usedMaterials
                });

                saveData();
                closeModal();
                renderProducao();
                showToast('Produção registrada com sucesso!');
            };
            
            try {
                lucide.createIcons();
            } catch (_) {}
        }

        function deleteProduction(id) {
            if (confirm('Deseja excluir este registro de produção? (O estoque não será revertido automaticamente)')) {
                appState.production = appState.production.filter(p => p.id !== id);
                saveData();
                renderProducao();
                showToast('Registro excluído.', 'error');
            }
        }

        function renderDashboardSubTab() {
            // LÓGICA DE DATA DE RESET (Ponto de Equilíbrio)
            const { resetDateStr, endDateStr, daysElapsed } = getBreakEvenConfig();

            // Recalcular variáveis necessárias para as sub-abas
            const salariesCosts = appState.employees.reduce((acc, emp) => acc + (emp.salary || 0), 0);
            const baseFixedCosts = appState.fixedAccounts.reduce((acc, a) => acc + a.amount, 0) + salariesCosts;
            
            // Gastos reais desde o último reset
            const actualExpenses = appState.transactions
                .filter(t => t.type === 'saida' && t.date >= resetDateStr)
                .reduce((acc, t) => acc + t.amount, 0);

            // Vendas desde o último reset
            const monthlySales = appState.sales.filter(s => s.date >= resetDateStr && s.status === 'completed');
            
            const totalRevenue = monthlySales.reduce((acc, s) => acc + s.total, 0);
            const totalVariableCosts = monthlySales.reduce((acc, s) => {
                const materialsCost = s.items.reduce((itemAcc, item) => {
                    const product = appState.inventory.find(p => p.id === item.productId);
                    return itemAcc + (product ? (product.costPrice * item.qty) : 0);
                }, 0);
                return acc + materialsCost + (s.deliveryHelperCostTotal || 0) + (s.fee || 0);
            }, 0);
            
            const contributionMargin = totalRevenue - totalVariableCosts;
            const contributionMarginPct = totalRevenue > 0 ? (contributionMargin / totalRevenue) : 0.35;
            
            const totalBreakEvenNeeded = contributionMarginPct > 0 ? (baseFixedCosts / contributionMarginPct) : baseFixedCosts;
            const breakEvenProgress = totalBreakEvenNeeded > 0 ? Math.min(100, (totalRevenue / totalBreakEvenNeeded) * 100) : 100;
            const isBreakEvenReached = totalRevenue >= totalBreakEvenNeeded;
            const remainingToSell = Math.max(0, totalBreakEvenNeeded - totalRevenue);

            const lowStockItems = appState.inventory.filter(p => p.stock <= p.minStock);
            const urgentEquipment = appState.equipment.filter(e => {
                const last = new Date(e.lastMaintenance);
                const next = new Date(last);
                next.setDate(last.getDate() + e.maintenanceInterval);
                return Math.ceil((next - new Date()) / (1000 * 60 * 60 * 24)) <= 7;
            });

            // Contas Fixas Urgentes (Atrasadas ou Próximas)
            const todayDay = new Date().getDate();
            const urgentFixedAccounts = appState.fixedAccounts.filter(acc => {
                const isPaid = appState.transactions.some(t => t.description.includes(acc.description) && t.date.startsWith(currentMonth));
                if (isPaid) return false;
                
                // Atrasada (dia do vencimento menor que hoje) ou Próxima (nos próximos 5 dias)
                const isOverdue = acc.dueDay < todayDay;
                const isUpcoming = acc.dueDay >= todayDay && acc.dueDay <= todayDay + 5;
                return isOverdue || isUpcoming;
            });

            if (dashboardSubTab === 'geral') {
                return `
                    <div class="space-y-4">
                        <!-- Break Even Minimalist Card -->
                        <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm relative overflow-hidden">
                            <div class="flex justify-between items-center mb-4">
                                <h4 class="text-sm font-bold flex items-center gap-2">
                                    <i data-lucide="target" class="w-4 h-4 text-primary-500"></i>
                                    Meta de Equilíbrio
                                </h4>
                                <div class="flex items-center gap-2">
                                    <span class="text-[9px] font-black uppercase text-slate-400 bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-lg">Ciclo: ${formatDate(resetDateStr)}</span>
                                    <span class="text-[9px] font-black uppercase text-primary-600 bg-primary-50 dark:bg-primary-900/20 px-2 py-1 rounded-lg">Reset: ${formatDate(endDateStr)}</span>
                                    <button onclick="resetBreakEven()" class="p-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-red-500 hover:text-white rounded-lg transition-all" title="Zerar Ciclo">
                                        <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="mb-3 flex items-center gap-2">
                                <span class="text-[9px] font-black uppercase text-slate-400">Dia ${daysElapsed}/30</span>
                                <div class="h-1.5 w-20 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                                    <div class="h-1.5 bg-primary-500" style="width: ${Math.min(100, (daysElapsed / 30) * 100)}%"></div>
                                </div>
                            </div>
                            <div class="relative h-4 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden mb-3">
                                <div class="${isBreakEvenReached ? 'bg-green-500' : 'bg-primary-500'} h-full transition-all duration-1000" style="width: ${breakEvenProgress}%"></div>
                                <div class="absolute inset-0 flex items-center justify-center text-[9px] font-black text-white mix-blend-difference">${Math.round(breakEvenProgress)}% COBERTO</div>
                            </div>

                                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-0.5">Faltam Vender</p>
                                    <p class="text-lg font-black ${isBreakEvenReached ? 'text-green-600' : 'text-slate-900 dark:text-white'}">
                                        ${isBreakEvenReached ? 'LUCRO!' : formatCurrency(remainingToSell)}
                                    </p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-0.5">Vendido Líquido</p>
                                    <p class="text-sm font-bold text-primary-600">${formatCurrency(totalRevenue)}</p>
                                </div>
                            </div>
                        </div>

                        <!-- Main Charts Group -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

                                        <i data-lucide="list" class="w-4 h-4 text-primary-500"></i>
                                        Últimas Vendas
                                    </h4>
                                    <button onclick="switchTab('vendas'); setTimeout(() => switchVendasTab('historico'), 50)" class="text-[10px] font-bold text-primary-600 uppercase">Ver todas</button>
                                </div>
                                <div class="space-y-3">
                                    ${appState.sales.slice(-4).reverse().map(s => `
                                        <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-700">

                                                </div>
                                            </div>
                                            <p class="text-xs font-black text-green-600">${formatCurrency(s.total)}</p>
                                        </div>

                                <div class="space-y-3 max-h-[220px] overflow-y-auto custom-scrollbar pr-2">
                                    ${appState.sales.filter(s => s.status === 'pending').map(s => `

                                </div>

                        <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-slate-100 dark:border-slate-700 shadow-sm">
                            <h4 class="text-sm font-bold mb-4 flex items-center gap-2">
                                <i data-lucide="calendar" class="w-4 h-4 text-primary-500"></i>
                                Custos Fixos e Pagamentos
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                ${appState.fixedAccounts.map(acc => {
                                    const isPaid = appState.transactions.some(t => t.description.includes(acc.description) && t.date.startsWith(currentMonth));
                                    return `
                                        <div class="flex items-center justify-between p-3 ${isPaid ? 'bg-slate-50 dark:bg-slate-700/30 border-slate-100' : 'bg-amber-50 dark:bg-amber-900/10 border-amber-100'} rounded-2xl border transition-all">
                                            <div class="flex items-center gap-3">
                                                <div class="${isPaid ? 'text-green-500' : 'text-amber-500'}">
                                                    <i data-lucide="${isPaid ? 'check-circle' : 'clock'}" class="w-4 h-4"></i>
                                                </div>
                                                <div>
                                                    <p class="text-[11px] font-bold text-slate-900 dark:text-white truncate max-w-[80px]">${acc.description}</p>
                                                    <p class="text-[9px] text-slate-500">Dia ${acc.dueDay}</p>
                                                </div>
                                            </div>
                                            <p class="text-xs font-black">${formatCurrency(acc.amount)}</p>
                                        </div>
                                    `;
                                }).join('')}
                                <div class="flex items-center justify-between p-3 bg-blue-50 dark:bg-blue-900/10 border-blue-100 rounded-2xl border">
                                    <div class="flex items-center gap-3">
                                        <div class="text-blue-500">
                                            <i data-lucide="users" class="w-4 h-4"></i>

                                        </div>

                                </div>
                            </div>
                        </div>
                    </div>
                `;

                return `

                                        <div class="flex items-center gap-4">

                                                <i data-lucide="alert-circle" class="w-6 h-6"></i>
                                            </div>
                                            <div>
                                                <p class="text-sm font-black text-slate-900 dark:text-white uppercase tracking-tight">${p.name}</p>
                                                <p class="text-[10px] text-red-600 font-bold uppercase">Restam apenas ${p.stock} ${p.unit}</p>
                                            </div>
                                        </div>
                                        <button onclick="switchTab('estoque')" class="w-10 h-10 bg-red-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-red-500/20 active:scale-95 transition-all">
                                            <i data-lucide="plus" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                `).join('') : `
                                    <div class="p-8 bg-slate-50 dark:bg-slate-800/50 rounded-[2rem] border border-dashed border-slate-200 dark:border-slate-700 text-center">
                                        <i data-lucide="check-circle" class="w-8 h-8 text-slate-300 mx-auto mb-2"></i>
                                        <p class="text-xs font-bold text-slate-400 uppercase">Estoque em dia</p>
                                    </div>
                                `}
                            </div>
                        </div>

                        <!-- Financeiro Alerts -->
                        <div class="space-y-3">
                            <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-400 flex items-center gap-2 ml-1">
                                <i data-lucide="calendar" class="w-3 h-3"></i>
                                Pendências Financeiras
                            </h4>
                            <div class="grid grid-cols-1 gap-3">
                                ${urgentFixedAccounts.length > 0 ? urgentFixedAccounts.map(acc => {
                                    const isOverdue = acc.dueDay < todayDay;
                                    return `
                                        <div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-[2rem] border ${isOverdue ? 'border-red-100 dark:border-red-900/20' : 'border-amber-100 dark:border-amber-900/20'} shadow-sm">
                                            <div class="flex items-center gap-4">
                                                <div class="w-12 h-12 ${isOverdue ? 'bg-red-50 text-red-600' : 'bg-amber-50 text-amber-600'} rounded-2xl flex items-center justify-center shadow-inner">
                                                    <i data-lucide="${isOverdue ? 'alert-triangle' : 'clock'}" class="w-6 h-6"></i>
                                                </div>
                                                <div>
                                                    <p class="text-sm font-black text-slate-900 dark:text-white uppercase tracking-tight">${acc.description}</p>
                                                    <div class="flex items-center gap-2">
                                                        <span class="text-[10px] ${isOverdue ? 'text-red-600' : 'text-amber-600'} font-black uppercase">${isOverdue ? 'ATRASADA' : 'VENCE DIA ' + acc.dueDay}</span>
                                                        <span class="w-1 h-1 bg-slate-300 rounded-full"></span>

                                                    </div>
                                                </div>

                                            <button onclick="switchTab('caixa')" class="w-10 h-10 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-xl flex items-center justify-center active:scale-95 transition-all">

        function switchDashboardTab(subTabId) {
            dashboardSubTab = subTabId;
            
            // 1. Atualizar visual dos botões de sub-aba sem recarregar o header
            const subNav = document.querySelector('.flex.gap-2.p-1.bg-slate-100.dark\\:bg-slate-800.rounded-2xl.mb-6');
            if (subNav) {
                const buttons = subNav.querySelectorAll('button');
                buttons.forEach(btn => {
                    const isGeral = btn.innerText.includes('Geral') && subTabId === 'geral';
                    const isFin = btn.innerText.includes('Finanças') && subTabId === 'financeiro';
                    const isAlert = btn.innerText.includes('Avisos') && subTabId === 'alertas';
                    
                    if (isGeral || isFin || isAlert) {
                        btn.className = "flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-white dark:bg-slate-700 shadow-sm text-primary-600 dark:text-white";
                    } else {
                        btn.className = "flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500";
                    }
                });
            }

            // 2. Atualizar apenas o subconteúdo para evitar o "pisca"
            const subContent = document.getElementById('dashboard-subcontent');
            if (subContent) {
                subContent.innerHTML = renderDashboardSubTab();
                lucide.createIcons();
                if (dashboardSubTab === 'geral' || dashboardSubTab === 'financeiro') {
                    setTimeout(initDashboardCharts, 50);
                }
            } else {
                renderDashboard();
            }
        }

        function initDashboardCharts() {
            const chartCashEl = document.getElementById('chart-cashflow');
            const chartPieEl = document.getElementById('chart-pie');
            
            if (dashboardSubTab === 'geral' && chartCashEl) {
                const ctxCash = chartCashEl.getContext('2d');
                
                // Agregação de dados reais dos últimos 6 meses
                const labels = [];
                const incomeData = [];
                const expenseData = [];
                
                const now = new Date();
                for (let i = 5; i >= 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const monthStr = d.toISOString().substring(0, 7);
                    labels.push(d.toLocaleDateString('pt-BR', { month: 'short' }));
                    
                    const monthlyIn = appState.transactions
                        .filter(t => t.type === 'entrada' && t.date.startsWith(monthStr))
                        .reduce((acc, t) => acc + t.amount, 0);
                    
                    const monthlyOut = appState.transactions
                        .filter(t => t.type === 'saida' && t.date.startsWith(monthStr))
                        .reduce((acc, t) => acc + t.amount, 0);
                        
                    incomeData.push(monthlyIn);
                    expenseData.push(monthlyOut);
                }
                
                if (dashboardCharts.cash) dashboardCharts.cash.destroy();
                
                dashboardCharts.cash = new Chart(ctxCash, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Entradas',
                                data: incomeData,
                                borderColor: '#10b981',
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3,
                                pointRadius: 4,
                                pointBackgroundColor: '#10b981'
                            },
                            {
                                label: 'Saídas',
                                data: expenseData,
                                borderColor: '#ef4444',
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                fill: true,
                                tension: 0.4,
                                borderWidth: 3,
                                pointRadius: 4,
                                pointBackgroundColor: '#ef4444'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false },
                                ticks: { callback: value => formatCurrency(value).split(',')[0] }
                            },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            if (dashboardSubTab === 'financeiro' && chartPieEl) {
                const ctxPie = chartPieEl.getContext('2d');
                
                // Vendas por Produto (Quantidade acumulada)
                const currentMonth = new Date().toISOString().substring(0, 7);
                const salesByProduct = {};
                
                appState.sales
                    .filter(s => s.date.startsWith(currentMonth))
                    .forEach(s => {
                        if (s.items && Array.isArray(s.items)) {
                            s.items.forEach(item => {
                                salesByProduct[item.name] = (salesByProduct[item.name] || 0) + item.qty;
                            });
                        }
                    });
                
                const pieLabels = Object.keys(salesByProduct);
                const pieData = Object.values(salesByProduct);
                
                if (dashboardCharts.pie) dashboardCharts.pie.destroy();

                dashboardCharts.pie = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: pieLabels.length > 0 ? pieLabels : ['Nenhuma venda'],
                        datasets: [{
                            data: pieData.length > 0 ? pieData : [1],
                            backgroundColor: ['#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#84cc16', '#f97316'],
                            borderWidth: 2,
                            borderColor: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
                            hoverOffset: 15
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '70%',
                        plugins: { 
                            legend: { 
                                position: 'bottom',
                                labels: { 
                                    padding: 15,
                                    usePointStyle: true,
                                    font: { size: 10, weight: '700' },
                                    generateLabels: (chart) => {
                                        const data = chart.data;
                                        if (data.labels.length && data.datasets.length) {
                                            return data.labels.map((label, i) => {
                                                const value = data.datasets[0].data[i];
                                                return {
                                                    text: `${value}x ${label}`,
                                                    fillStyle: data.datasets[0].backgroundColor[i],
                                                    strokeStyle: data.datasets[0].borderColor,
                                                    lineWidth: data.datasets[0].borderWidth,
                                                    hidden: false,
                                                    index: i
                                                };
                                            });
                                        }
                                        return [];
                                    }
                                } 
                            },
                            tooltip: {
                                callbacks: {
                                    label: (context) => `Quantidade: ${context.raw}`
                                }
                            }
                        }
                    }
                });
            }
        }

        function filterInventory() {
            const search = document.getElementById('inventory-search')?.value.toLowerCase() || '';
            const cat = document.getElementById('inventory-filter-cat')?.value || '';
            
            const filtered = appState.inventory.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(search) || p.code.toLowerCase().includes(search);
                const matchesCat = cat === '' || p.category === cat;
                return matchesSearch && matchesCat;
            });

            const container = document.getElementById('inventory-list');
            if (!container) return;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 text-center bg-white dark:bg-slate-800 rounded-3xl border border-dashed border-slate-200 dark:border-slate-700">
                        <i data-lucide="package-search" class="w-12 h-12 text-slate-200 mx-auto mb-3"></i>
                        <p class="text-sm text-slate-400 font-bold uppercase tracking-widest">Nenhum produto encontrado</p>
                    </div>
                `;
            } else {
                container.innerHTML = filtered.map(p => renderInventoryCard(p)).join('');
            }
            
            try {
                lucide.createIcons();
            } catch (_) {}
        }

                } else {
                    appState.inventory.push(newProduct);

                closeModal();
                renderEstoque();
                showToast(product ? 'Item atualizado!' : 'Item cadastrado!');

        function toggleRecipeField() {
            const type = document.getElementById('p-type').value;
            const recipeSection = document.getElementById('recipe-section');
            const sellContainer = document.getElementById('p-sell-container');
            const helperContainer = document.getElementById('p-helper-container');
            
            if (recipeSection) recipeSection.classList.toggle('hidden', type !== 'final');
            if (sellContainer) sellContainer.classList.toggle('hidden', type === 'raw');
            if (helperContainer) helperContainer.classList.toggle('hidden', type === 'raw');

        function addRecipeItem() {
            const container = document.getElementById('recipe-items');
            const div = document.createElement('div');
            div.innerHTML = renderRecipeItem();
            container.appendChild(div.firstElementChild);
            lucide.createIcons();
            
            // Add listeners to new items for cost calculation
            const lastRow = container.lastElementChild;
            lastRow.querySelector('.recipe-material').onchange = calculateRecipeCost;
            lastRow.querySelector('.recipe-qty').oninput = calculateRecipeCost;
        }

        let lastCalculatedCost = 0;

        function calculateRecipeCost() {
            let totalCost = 0;
            document.querySelectorAll('.recipe-row').forEach(row => {
                const mId = parseInt(row.querySelector('.recipe-material').value);
                const mQty = parseFloat(row.querySelector('.recipe-qty').value) || 0;
                if (mId) {
                    const material = appState.inventory.find(m => m.id === mId);
                    if (material) {
                        totalCost += (material.costPrice * mQty);
                    }
                }
            });

            lastCalculatedCost = totalCost;
            const display = document.getElementById('recipe-total-cost');
            const btnApply = document.getElementById('btn-apply-cost');
            
            if (display) {
                display.innerText = `Custo Matéria-Prima: ${formatCurrency(totalCost)}`;
                if (totalCost > 0) {
                    display.classList.add('bg-success/10', 'text-success', 'border-success/20');
                    display.classList.remove('bg-primary-50', 'text-primary-600', 'border-primary-100');
                    btnApply.classList.remove('hidden');
                } else {
                    display.classList.remove('bg-success/10', 'text-success', 'border-success/20');
                    display.classList.add('bg-primary-50', 'text-primary-600', 'border-primary-100');
                    btnApply.classList.add('hidden');
                }
            }
        }

        function applyRecipeCost() {
            const costInput = document.getElementById('p-cost');
            if (costInput && lastCalculatedCost > 0) {
                costInput.value = lastCalculatedCost.toFixed(2);
                showToast('Custo de fabricação aplicado!');
            }
        }

        function filterFullStatement() {
            const search = document.getElementById('statement-search').value.toLowerCase();
            const start = document.getElementById('statement-start').value;
            const end = document.getElementById('statement-end').value;
            const type = document.getElementById('statement-type').value;

            // Agrupar transações filtradas
            const groupedFiltered = [];
            const processedSaleIds = new Set();

            appState.transactions.slice().reverse().forEach(t => {
                const matchesSearch = !search || t.description.toLowerCase().includes(search) || t.category.toLowerCase().includes(search);
                const matchesType = type === '' || t.type === type;
                const matchesDate = (!start || t.date >= start) && (!end || t.date <= end);

                if (matchesSearch && matchesType && matchesDate) {
                    if (t.saleId) {
                        if (!processedSaleIds.has(t.saleId)) {
                            const saleGroup = appState.transactions.filter(x => x.saleId === t.saleId);
                            const mainEntry = saleGroup.find(x => x.type === 'entrada') || t;
                            const sale = appState.sales.find(s => s.id === t.saleId);
                            
                            const totalGross = saleGroup.filter(x => x.type === 'entrada').reduce((acc, x) => acc + x.amount, 0);
                            const totalFees = saleGroup.filter(x => x.type === 'saida' && x.category === 'Taxas de Cartão').reduce((acc, x) => acc + x.amount, 0);
                            const totalHelper = saleGroup.filter(x => x.type === 'saida' && (x.category === 'Pagamento de Ajudante' || x.isHelperPayment)).reduce((acc, x) => acc + x.amount, 0);
                            
                            groupedFiltered.push({
                                ...mainEntry,
                                type: 'entrada',
                                isGroup: true,
                                amount: totalGross,
                                fees: totalFees,
                                helperCost: totalHelper,
                                description: `Venda — ${sale ? sale.clientName : (mainEntry.description.split(' - ')[1] || 'Consumidor Final')}`
                            });
                            processedSaleIds.add(t.saleId);
                        }
                    } else {
                        groupedFiltered.push({ ...t, isGroup: false });
                    }
                }
            });

            document.getElementById('full-statement-list').innerHTML = groupedFiltered.map(t => renderFintechRow(t)).join('') || 
                '<div class="p-12 text-center text-slate-400 italic">Nenhuma movimentação encontrada.</div>';
            lucide.createIcons();
        }

        function payFixedAccount(id) {
            const acc = appState.fixedAccounts.find(a => a.id === id);
            if (!acc) return;

            if (confirm(`Deseja lançar o pagamento de ${formatCurrency(acc.amount)} para "${acc.description}"?`)) {
                const trans = {
                    id: Date.now(),
                    type: 'saida',
                    description: `Pagamento Fixo: ${acc.description}`,
                    amount: acc.amount,
                    date: new Date().toISOString().split('T')[0],
                    category: acc.category,
                    account: 'Caixa Principal',
                    paymentMethod: 'PIX' // Default
                };

        function applyCashFilter() {
            const search = document.getElementById('filter-search').value.toLowerCase();
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const type = document.getElementById('filter-type').value;

            const filtered = appState.transactions.filter(t => {
                const matchesSearch = !search || t.description.toLowerCase().includes(search) || t.category.toLowerCase().includes(search);
                const matchesType = type === '' || t.type === type;
                const matchesDate = (!start || t.date >= start) && (!end || t.date <= end);
                return matchesSearch && matchesType && matchesDate;
            });

            closeModal();
            renderCaixaFiltered(filtered);
        }

        function renderCaixaFiltered(transactions) {
            // Agrupar transações filtradas para o modal de filtro
            const groupedFiltered = [];
            const processedSaleIds = new Set();

            transactions.slice().reverse().forEach(t => {
                if (t.saleId) {
                    if (!processedSaleIds.has(t.saleId)) {
                        const saleGroup = appState.transactions.filter(x => x.saleId === t.saleId);
                        const mainEntry = saleGroup.find(x => x.type === 'entrada') || t;
                        const sale = appState.sales.find(s => s.id === t.saleId);
                        
                        const totalGross = saleGroup.filter(x => x.type === 'entrada').reduce((acc, x) => acc + x.amount, 0);
                        const totalFees = saleGroup.filter(x => x.type === 'saida' && x.category === 'Taxas de Cartão').reduce((acc, x) => acc + x.amount, 0);
                        const totalHelper = saleGroup.filter(x => x.type === 'saida' && (x.category === 'Pagamento de Ajudante' || x.isHelperPayment)).reduce((acc, x) => acc + x.amount, 0);
                        
                        groupedFiltered.push({
                            ...mainEntry,
                            type: 'entrada',
                            isGroup: true,
                            amount: totalGross,
                            fees: totalFees,
                            helperCost: totalHelper,
                            description: `Venda — ${sale ? sale.clientName : (mainEntry.description.split(' - ')[1] || 'Consumidor Final')}`
                        });
                        processedSaleIds.add(t.saleId);
                    }
                } else {
                    groupedFiltered.push({ ...t, isGroup: false });
                }
            });

            renderCaixa(); // Reset layout base
            const container = document.querySelector('.divide-y');
            if (container) {
                container.innerHTML = groupedFiltered.map(t => renderFintechRow(t)).join('') || 
                    '<div class="p-12 text-center text-slate-400 italic">Nenhuma movimentação para este filtro.</div>';
                lucide.createIcons();
            }
        }

        }

                            <div>

                                <input type="number" id="sm-qty" required placeholder="0.00" step="0.001" min="0.001" class="w-full p-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-2xl outline-none focus:ring-2 focus:ring-primary-500 font-black text-sm">
                            </div>
                        </div>

                        <!-- Campos Financeiros Opcionais -->
                        <div id="sm-finance-fields" class="space-y-4 p-4 bg-primary-50/50 dark:bg-primary-900/10 rounded-2xl border border-primary-100 dark:border-primary-800/30">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary-600 mb-1.5">Preço Unitário (R$)</label>
                                    <input type="number" id="sm-price" placeholder="0.00" step="0.01" min="0" class="w-full p-3 bg-white dark:bg-slate-800 border border-primary-200 dark:border-primary-800 rounded-xl outline-none focus:ring-2 focus:ring-primary-500 font-bold text-sm">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-black uppercase tracking-widest text-primary-600 mb-1.5">Valor Total (R$)</label>
                                    <input type="number" id="sm-total" placeholder="0.00" step="0.01" min="0" class="w-full p-3 bg-white dark:bg-slate-800 border border-primary-200 dark:border-primary-800 rounded-xl outline-none focus:ring-2 focus:ring-primary-500 font-bold text-sm">
                                </div>
                            </div>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <div class="relative flex items-center">
                                    <input type="checkbox" id="sm-gen-expense" class="peer hidden">
                                    <div class="w-5 h-5 border-2 border-primary-200 dark:border-primary-800 rounded-lg peer-checked:bg-primary-600 peer-checked:border-primary-600 transition-all"></div>
                                    <i data-lucide="check" class="w-3.5 h-3.5 text-white absolute left-0.5 top-0.5 opacity-0 peer-checked:opacity-100 transition-all"></i>
                                </div>
                                <span class="text-xs font-black text-primary-700 dark:text-primary-400 uppercase tracking-tight">Gerar despesa no financeiro</span>
                            </label>
                        </div>

                        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-700">
                            <button type="button" onclick="closeModal()" class="w-full sm:w-auto px-6 py-4 sm:py-2.5 rounded-2xl border border-slate-200 dark:border-slate-700 font-black text-xs uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Cancelar</button>
                            <button type="submit" id="btn-confirm-stock" class="w-full sm:w-auto px-6 py-4 sm:py-2.5 rounded-2xl bg-primary-600 text-white font-black text-xs uppercase tracking-widest hover:brightness-95 shadow-lg shadow-primary-500/20 transition-all active:scale-95">Confirmar Ajuste</button>
                        </div>
                    </form>
                </div>
            `;
            openModal(html);
            try { lucide.createIcons(); } catch (_) {}
            
            const unitInput = document.getElementById('sm-price');
            const totalInput = document.getElementById('sm-total');
            const qtyInput = document.getElementById('sm-qty');
            const prodSelect = document.getElementById('sm-prod');
            const typeSelect = document.getElementById('sm-type');
            const genExpenseCheck = document.getElementById('sm-gen-expense');
            const form = document.getElementById('stock-move-form');

            const calcTotal = () => {
                const qty = parseFloat(qtyInput.value) || 0;
                const unit = parseFloat(unitInput.value) || 0;
                if (qty > 0 && unit >= 0) totalInput.value = (qty * unit).toFixed(2);
            };

            const calcUnit = () => {
                const qty = parseFloat(qtyInput.value) || 0;
                const total = parseFloat(totalInput.value) || 0;
                if (qty > 0 && total >= 0) unitInput.value = (total / qty).toFixed(2);
            };

            if (unitInput) unitInput.oninput = calcTotal;
            if (totalInput) totalInput.oninput = calcUnit;
            if (qtyInput) qtyInput.oninput = calcTotal;

            if (form) {
                form.onsubmit = (e) => {
                    e.preventDefault();
                    
                    try {
                        const pId = parseInt(prodSelect.value);
                        if (isNaN(pId)) {
                            showToast("Por favor, selecione um produto.", "error");
                            return;
                        }

                        const type = typeSelect.value;
                        const qty = parseFloat(qtyInput.value);
                        if (isNaN(qty) || qty <= 0) {
                            showToast("Por favor, informe uma quantidade válida.", "error");
                            return;
                        }

                        const unitPrice = parseFloat(unitInput?.value) || 0;
                        const totalPrice = parseFloat(totalInput?.value) || 0;
                        const genExpense = genExpenseCheck?.checked || false;
                        
                        const product = appState.inventory.find(p => p.id === pId);
                        if (!product) {
                            showToast("Produto não encontrado.", "error");
                            return;
                        }

                        const oldStock = product.stock;
                        if (type === 'entrada') {
                            product.stock += qty;
                        } else {
                            product.stock = Math.max(0, product.stock - qty);
                        }
                        
                        // Inicializa stockMovements se não existir (segurança extra)
                        if (!Array.isArray(appState.stockMovements)) appState.stockMovements = [];

                        // Grava no histórico de movimentos
                        const movement = {
                            id: Date.now(),
                            productId: pId,
                            productName: product.name,
                            type: type,
                            qty: qty,
                            unitPrice: unitPrice,
                            totalPrice: totalPrice,
                            date: new Date().toISOString().split('T')[0],
                            oldStock: oldStock,
                            newStock: product.stock
                        };
                        appState.stockMovements.push(movement);

                        // Se for entrada com preço e marcado para gerar despesa
                        if (type === 'entrada' && totalPrice > 0 && genExpense) {
                            if (!Array.isArray(appState.transactions)) appState.transactions = [];
                            
                            const trans = {
                                id: Date.now() + 1,
                                type: 'saida',
                                description: `Compra: ${qty} ${product.unit} de ${product.name}`,
                                amount: totalPrice,
                                date: movement.date,
                                category: 'Compra de Matéria-Prima',
                                account: 'Caixa Principal',
                                paymentMethod: 'Dinheiro'
                            };
                            appState.transactions.push(trans);
                        }

                        // Atualiza custo médio do produto se for entrada
                        if (type === 'entrada' && unitPrice > 0) {
                            product.costPrice = unitPrice;
                        }
                        
                        saveData(); 
                        closeModal(); 
                        renderEstoque(); 
                        showToast(`Estoque de ${product.name} atualizado!`);
                    } catch (err) {
                        console.error("Erro ao processar ajuste de estoque:", err);
                        showToast("Erro ao processar o ajuste. Tente novamente.", "error");
                    }
                };
            }
        }

        window.toggleStockPriceFields = () => {
            const type = document.getElementById('sm-type').value;
            const fields = document.getElementById('sm-finance-fields');
            if (type === 'entrada') {

                const date = new Date().toISOString().split('T')[0];

                // 1. Record final payment in history
                emp.history.push({
                    id: Date.now(),
                    type: 'pagamento',
                    amount: netAmount,
                    date: date,
                    description: `Fechamento Salário ${emp.payCycle}`
                });

                // 2. Clear current advances (they are now settled)
                // We mark them as 'settled' or just filter them out for the next balance calculation
                // Let's change their type so they don't count for the NEXT balance
                emp.history.forEach(h => {
                    if (h.type === 'vale') h.type = 'vale_pago';

                // 3. Record in Cash Flow
                appState.transactions.push({
                    id: Date.now() + 1,
                    type: 'saida',
                    category: 'Folha de Pagamento',
                    amount: netAmount,
                    date: date,
                    description: `PAGTO SALÁRIO: ${emp.name} (${emp.payCycle})`,
                    account: 'Caixa Principal',
                    paymentMethod: 'PIX'
                });

                saveData();
                closeModal();
                renderFuncionarios();
                showToast(`Pagamento de ${formatCurrency(netAmount)} realizado!`);
            };

        let finalizePayments = [];
        let finalizeCurrentStep = 1;
        let finalizeDate = new Date().toISOString().split('T')[0];
        let finalizeHelperName = '';
        let finalizeHelperAdjustment = 0;

        window.finalizePendingSale = (saleId) => {
            const sale = appState.sales.find(s => s.id === saleId);
            if (!sale) return;

            finalizeCurrentStep = 1;
            finalizeDate = new Date().toISOString().split('T')[0];
            finalizeHelperName = '';
            
            // Calcula os custos de ajudante por item
            const itemsWithHelperFees = (sale.items || []).map(item => {
                const product = appState.inventory.find(p => p.id === item.productId);
                const helperQty = (item.isMeter) ? (item.units || 1) : (item.qty || 1);
                return {
                    ...item,
                    helperFee: product?.helperFee || 0,
                    helperQty: helperQty
                };
            });

            const initialTotalHelperCost = itemsWithHelperFees.reduce((acc, item) => acc + (item.helperFee * item.helperQty), 0);
            finalizeHelperAdjustment = initialTotalHelperCost;

            if (sale.payments && sale.payments.length > 0) {
                finalizePayments = sale.payments.map(p => ({ ...p }));
            } else {
                finalizePayments = [{ method: sale.paymentMethod || appState.config.paymentMethods[0], amount: sale.total }];

                    stepContent = `

                                </div>
                                <div class="divide-y divide-slate-50 dark:divide-slate-700 max-h-[200px] overflow-y-auto">
