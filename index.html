            const container = document.getElementById('pdv-product-results') || document.getElementById('pdv-results');
            if (!container) return;

            const html = results.map(p => {
                const isLowStock = p.stock <= p.minStock;
                return `
                    <button onclick="addToCart(${p.id})" class="w-full flex items-center justify-between p-4 bg-white dark:bg-slate-700 border border-slate-100 dark:border-slate-600 rounded-2xl hover:border-primary-500 cursor-pointer transition-all group shadow-sm active:scale-95 text-left">
                        <div class="flex items-center gap-3 min-w-0">
                            <div class="w-10 h-10 bg-slate-50 dark:bg-slate-600 rounded-xl flex items-center justify-center text-primary-600 group-hover:bg-primary-50 transition-all">
                                <i data-lucide="package" class="w-5 h-5"></i>
                            </div>
                            <div class="min-w-0">
                                <h5 class="font-black text-xs text-slate-900 dark:text-white uppercase truncate tracking-tight">${p.name}</h5>
                                <p class="text-[10px] font-bold ${isLowStock ? 'text-red-500' : 'text-slate-400'} uppercase">
                                    ${p.stock} ${p.unit} em estoque
                                </p>
                            </div>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="font-black text-primary-600 text-sm">${formatCurrency(p.sellPrice)}</p>
                            <span class="text-[8px] font-black text-slate-300 uppercase">Adicionar</span>
                        </div>
                    </button>
                `;
            }).join('');

            container.innerHTML = html || '<div class="py-12 text-center text-slate-400 italic text-xs uppercase font-bold tracking-widest">Nenhum produto encontrado.</div>';
            lucide.createIcons();
        }

        function finalizePendingSale(saleId) {
            const sale = appState.sales.find(s => s.id === saleId);
            if (!sale) return;
            const helperUnits = (sale.items || []).reduce((acc, i) => acc + (i.qty || 0), 0);
            const defaultHelperFee = (() => {
                const first = (sale.items || [])[0];
                if (!first) return 0;
                const p = appState.inventory.find(x => x.id === first.productId);
                return p?.helperFee || 0;
            })();
            const helperCountDefault = sale.deliveryHelperCount ?? 1;
            const helperFeeDefault = sale.deliveryHelperFeePerUnit ?? defaultHelperFee;

            // Abrir modal para confirmar detalhes finais do recebimento
            let html = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold dark:text-white">Confirmar Recebimento</h3>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="mb-6 p-4 bg-orange-50 dark:bg-orange-900/10 border border-orange-100 dark:border-orange-800 rounded-xl">
                        <p class="text-sm text-orange-800 dark:text-orange-300">Confirmando entrega e recebimento do Pedido <b>#${saleId}</b></p>
                        <p class="text-2xl font-black text-orange-600 mt-1">${formatCurrency(sale.total)}</p>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Confirmar Forma de Pagamento</label>
                            <select id="confirm-payment-method" class="w-full p-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none focus:ring-2 focus:ring-primary-500">
                                ${appState.config.paymentMethods.map(m => `<option value="${m}" ${m === sale.paymentMethod ? 'selected' : ''}>${m}</option>`).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Data do Recebimento (Hoje)</label>
                            <input type="date" id="confirm-payment-date" value="${new Date().toISOString().split('T')[0]}" class="w-full p-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none focus:ring-2 focus:ring-primary-500">
                        </div>
                        <div class="p-4 bg-slate-50 dark:bg-slate-700/40 border border-slate-100 dark:border-slate-700 rounded-xl">
                            <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-3">Custo Ajudante (por unidade)</p>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Quantidade de ajudantes</label>
                                    <select id="confirm-helper-count" class="w-full p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl outline-none text-sm">
                                        ${[0,1,2,3].map(n => `<option value="${n}" ${n === helperCountDefault ? 'selected' : ''}>${n}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Valor do ajudante (R$)</label>
                                    <input type="number" step="0.01" id="confirm-helper-fee" value="${helperFeeDefault}" class="w-full p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-xl outline-none text-sm">
                                </div>
                            </div>
                            <div class="flex justify-between items-center mt-3 text-xs">
                                <span class="font-bold text-slate-500">Unidades no pedido</span>
                                <span class="font-black text-slate-700 dark:text-slate-200">${helperUnits}</span>
                            </div>
                            <div class="flex justify-between items-center mt-1 text-xs">
                                <span class="font-bold text-slate-500">Custo ajudante total</span>
                                <span id="confirm-helper-total" class="font-black text-primary-600">${formatCurrency((helperCountDefault || 0) * (helperFeeDefault || 0) * helperUnits)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-8">
                        <button onclick="closeModal()" class="py-3 rounded-xl border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">Cancelar</button>
                        <button id="btn-confirm-final" class="py-3 rounded-xl bg-success text-white font-bold hover:brightness-95 shadow-lg shadow-success/20 transition-all active:scale-95">
                            Confirmar Entrega e Receber
                        </button>
                    </div>
                </div>
            `;
            openModal(html);
            const updateHelperTotal = () => {
                const c = parseInt(document.getElementById('confirm-helper-count').value) || 0;
                const f = parseFloat(document.getElementById('confirm-helper-fee').value) || 0;
                document.getElementById('confirm-helper-total').innerText = formatCurrency(c * f * helperUnits);
            };
            document.getElementById('confirm-helper-count').onchange = updateHelperTotal;
            document.getElementById('confirm-helper-fee').oninput = updateHelperTotal;

            document.getElementById('btn-confirm-final').onclick = () => {
                const finalMethod = document.getElementById('confirm-payment-method').value;
                const finalDate = document.getElementById('confirm-payment-date').value;
                const helperCount = parseInt(document.getElementById('confirm-helper-count').value) || 0;
                const helperFeePerUnit = parseFloat(document.getElementById('confirm-helper-fee').value) || 0;

                // 1. Mark as completed
                sale.status = 'completed';
                sale.date = finalDate; // Data real do recebimento
                sale.paymentMethod = finalMethod;
                sale.deliveryHelperCount = helperCount;
                sale.deliveryHelperFeePerUnit = helperFeePerUnit;
                sale.deliveryHelperUnits = helperUnits;
                sale.deliveryHelperCostTotal = helperCount * helperFeePerUnit * helperUnits;

                // 2. Record Transaction - Entrada (Bruto)
                appState.transactions.push({
                    id: Date.now(),
                    type: 'entrada',
                    category: 'Venda de Pré-moldados',
                    amount: sale.total,
                    date: finalDate,
                    description: `Recebimento Pedido #${saleId} - ${sale.clientName}`,
                    account: 'Caixa Principal',
                    paymentMethod: finalMethod
                });

                // 3. Record Transaction - Saída (Taxa de Cartão) se houver
                // Recalcular taxa se o método mudou para cartão
                if (finalMethod.toLowerCase().includes('cartão')) {
                    let feePerc = 0;
                    if (finalMethod.includes('Crédito')) {
                        // Busca a taxa padrão de 1x se não houver info (simplificado)
                        feePerc = appState.config.cardFees.credit[0].fee;
                    } else {
                        feePerc = appState.config.cardFees.debit;
                    }
                    sale.fee = sale.total * (feePerc / 100);
                    
                    if (sale.fee > 0) {
                        appState.transactions.push({
                            id: Date.now() + 1,
                            type: 'saida',
                            category: 'Taxas de Cartão',
                            amount: sale.fee,
                            date: finalDate,
                            description: `Taxa Cartão - Pedido #${saleId}`,
                            account: 'Caixa Principal',
                            paymentMethod: finalMethod
                        });
                    }
                }

                saveData();
                closeModal();
                showToast('Venda concluída e pagamento registrado!');
                renderVendas();

                // Abrir modal de sucesso com opção de baixar recibo
                openPostSaleSuccessModal(sale);
            };
        }

        function cancelPendingSale(saleId) {
            const saleIndex = appState.sales.findIndex(s => s.id === saleId);
            if (saleIndex === -1) return;
            
            const sale = appState.sales[saleIndex];
            
            if (confirm(`Deseja realmente CANCELAR o pedido #${saleId}? O estoque dos produtos será devolvido.`)) {
                // 1. Return items to stock
                sale.items.forEach(item => {
                    const product = appState.inventory.find(p => p.id === item.productId);
                    if (product) {
                        product.stock += item.qty;
                    }
                });

                // 2. Remove the sale or mark as cancelled
                // To keep history, we could mark as 'cancelled', but for now let's just remove to keep it clean as requested
                appState.sales.splice(saleIndex, 1);

                saveData();
                showToast('Pedido cancelado e estoque devolvido!', 'error');
                renderVendas();
            }
        }

        function addToCart(productId) {
            const product = appState.inventory.find(p => p.id === productId);
            if (!product) {
                showToast('Produto não encontrado!', 'error');
                return;
            }

            const inCart = currentCart.find(item => item.productId === productId);
            if (inCart) {
                inCart.qty++;
                if (inCart.qty > product.stock) {
                    showToast(`Atenção: Quantidade (${inCart.qty}) maior que o estoque atual (${product.stock})`, 'warning');
                }
            } else {
                currentCart.push({
                    productId: product.id,
                    name: product.name,
                    price: product.sellPrice,
                    qty: 1
                });
                
                if (product.stock <= 0) {
                    showToast(`${product.name} adicionado (Sem estoque atual)`, 'warning');
                } else {
                    showToast(`${product.name} adicionado!`);
                }
            }
            updatePDVCart();
        }

        function removeFromCart(productId) {
            currentCart = currentCart.filter(item => item.productId !== productId);
            updatePDVCart();
        }

        function editCartItemPrice(productId) {
            const item = currentCart.find(i => i.productId === productId);
            if (!item) return;

            const newPrice = prompt(`Alterar preço unitário de "${item.name}":`, item.price);
            if (newPrice !== null) {
                const price = parseFloat(newPrice);
                if (!isNaN(price) && price >= 0) {
                    item.price = price;
                    updatePDVCart();
                    showToast('Preço unitário alterado!');
                } else {
                    showToast('Preço inválido!', 'error');
                }
            }
        }

        function updateQty(productId, delta) {
            const item = currentCart.find(i => i.productId === productId);
            const product = appState.inventory.find(p => p.id === productId);
            
            const newQty = item.qty + delta;
            if (newQty > 0) {
                item.qty = newQty;
                if (newQty > product.stock) {
                    showToast(`Quantidade (${newQty}) maior que o estoque atual (${product.stock})`, 'warning');
                }
            } else if (newQty === 0) {
                removeFromCart(productId);
            }
            updatePDVCart();
        }

        function updatePDVCart() {
            const container = document.getElementById('pdv-cart-items');
            if (!container) return;

            if (currentCart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 text-slate-400 opacity-30">
                        <i data-lucide="shopping-cart" class="w-12 h-12 mb-2"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Carrinho Vazio</p>
                    </div>
                `;
                document.getElementById('pdv-subtotal').innerText = formatCurrency(0);
                document.getElementById('pdv-total').innerText = formatCurrency(0);
                document.getElementById('btn-checkout').disabled = true;
                document.getElementById('btn-quote').disabled = true;
                lucide.createIcons();
                return;
            }

            let subtotal = 0;
            container.innerHTML = currentCart.map((item, index) => {
                subtotal += item.price * item.qty;
                return `
                    <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-600/50 group animate-fade-in">
                        <div class="min-w-0 flex-1">
                            <h5 class="text-[10px] font-black text-slate-900 dark:text-white uppercase truncate tracking-tight">${item.name}</h5>
                            <button onclick="editCartItemPrice(${item.productId})" class="text-[10px] font-bold text-primary-600 hover:underline">${formatCurrency(item.price)}</button>
                        </div>
                        <div class="flex items-center gap-2 ml-4">
                            <div class="flex items-center bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-600 px-2 py-1">
                                <button onclick="updateQty(${item.productId}, -1)" class="p-1 hover:text-primary-600"><i data-lucide="minus" class="w-3 h-3"></i></button>
                                <span class="px-2 text-xs font-black min-w-[20px] text-center">${item.qty}</span>
                                <button onclick="updateQty(${item.productId}, 1)" class="p-1 hover:text-primary-600"><i data-lucide="plus" class="w-3 h-3"></i></button>
                            </div>
                            <button onclick="removeFromCart(${item.productId})" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const total = subtotal - pdvDiscount;
            document.getElementById('pdv-subtotal').innerText = formatCurrency(subtotal);
            document.getElementById('pdv-discount').innerText = formatCurrency(pdvDiscount);
            document.getElementById('pdv-total').innerText = formatCurrency(total);
            document.getElementById('btn-checkout').disabled = false;
            document.getElementById('btn-quote').disabled = false;
            lucide.createIcons();
        }

        function generateQuote() {
            if (currentCart.length === 0) return;
            
            const subtotal = currentCart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const total = subtotal - pdvDiscount;
            
            const quoteData = {
                id: Math.floor(1000 + Math.random() * 9000),
                clientName: pdvClient ? pdvClient.name : 'Consumidor Final',
                date: new Date().toISOString().split('T')[0],
                items: currentCart.map(i => ({ ...i })),
                total: total,
                discount: pdvDiscount
            };
            
            generateQuotePDF(quoteData);
            showToast('Orçamento gerado com sucesso!');
        }

        function checkoutPDV() {
            const subtotal = currentCart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const total = subtotal - pdvDiscount;
            
            let html = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold dark:text-white">Finalizar Venda</h3>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="mb-6 p-4 bg-slate-50 dark:bg-slate-700/50 rounded-xl border border-slate-100 dark:border-slate-700">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-slate-500">Valor Total</span>
                            <span class="text-2xl font-black text-primary-600">${formatCurrency(total)}</span>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Forma de Pagamento</label>
                            <select id="pdv-final-method" class="w-full p-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none focus:ring-2 focus:ring-primary-500" onchange="updateCheckoutUI(${total})">
                                ${appState.config.paymentMethods.map(m => `<option value="${m}">${m}</option>`).join('')}
                            </select>
                        </div>
                        
                        <!-- Troco para Dinheiro -->
                        <div id="pdv-change-calc" class="hidden animate-fade-in">
                            <label class="block text-sm font-medium mb-1 text-slate-500">Valor Recebido</label>
                            <input type="number" id="pdv-received" step="0.01" class="w-full p-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none focus:ring-2 focus:ring-primary-500" onkeyup="calcChange(${total})">
                            <div class="mt-2 text-right">
                                <span class="text-xs text-slate-500">Troco: </span>
                                <span id="pdv-change-val" class="text-sm font-bold text-success">R$ 0,00</span>
                            </div>
                        </div>

                        <!-- Taxas para Cartão -->
                        <div id="pdv-card-fees" class="hidden p-4 bg-orange-50 dark:bg-orange-900/10 border border-orange-100 dark:border-orange-800 rounded-xl animate-fade-in">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-orange-600 uppercase mb-1">Parcelas</label>
                                    <select id="pdv-installments" class="w-full p-2 bg-white dark:bg-slate-800 border border-orange-200 dark:border-orange-700 rounded-lg outline-none text-sm" onchange="calcCardFee(${total})">
                                        <!-- Preenchido via updateCheckoutUI -->
                                    </select>
                                </div>
                                <div class="text-right">
                                    <label class="block text-[10px] font-bold text-orange-600 uppercase mb-1">Valor Líquido</label>
                                    <p id="pdv-net-val" class="text-sm font-black text-orange-700 dark:text-orange-400">${formatCurrency(total)}</p>
                                    <p id="pdv-fee-info" class="text-[9px] text-orange-500 font-bold uppercase"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Data de Entrega (Apenas para Pendente) -->
                        <div id="pdv-delivery-date-container" class="space-y-1">
                            <label class="block text-sm font-medium mb-1 text-slate-500">Data Prevista de Entrega</label>
                            <input type="date" id="pdv-delivery-date" value="${new Date(Date.now() + 86400000).toISOString().split('T')[0]}" class="w-full p-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none focus:ring-2 focus:ring-primary-500">
                            <p class="text-[10px] text-slate-400 italic">* Necessário apenas para agendamento de entrega.</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-8">
                        <button onclick="closeModal()" class="py-3 rounded-xl border border-slate-200 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-700">Voltar</button>
                        <div class="flex flex-col gap-2">
                            <button onclick="confirmSale(${total}, 'completed')" class="py-3 rounded-xl bg-success text-white font-bold hover:brightness-95 shadow-lg shadow-success/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                                <i data-lucide="check-circle" class="w-5 h-5"></i> Receber Agora
                            </button>
                            <button onclick="confirmSale(${total}, 'pending')" class="py-2.5 rounded-xl bg-orange-500 text-white text-xs font-bold hover:brightness-95 shadow-lg shadow-orange-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                                <i data-lucide="truck" class="w-4 h-4"></i> Agendar Entrega (Receber na Entrega)
                            </button>
                        </div>
                    </div>
                </div>
            `;
            openModal(html);
            updateCheckoutUI(total);
        }

        function updateCheckoutUI(total) {
            const method = document.getElementById('pdv-final-method').value;
            const changeCalc = document.getElementById('pdv-change-calc');
            const cardFees = document.getElementById('pdv-card-fees');
            const installmentSelect = document.getElementById('pdv-installments');
            
            changeCalc.classList.toggle('hidden', method !== 'Dinheiro');
            cardFees.classList.toggle('hidden', !method.toLowerCase().includes('cartão'));
            
            if (method.toLowerCase().includes('cartão')) {
                // Preencher parcelas baseado no tipo de cartão
                let options = "";
                if (method.includes('Crédito')) {
                    appState.config.cardFees.credit.forEach(c => {
                        options += `<option value="${c.fee}">${c.installments}x (${c.fee}%)</option>`;
                    });
                } else {
                    options = `<option value="${appState.config.cardFees.debit}">1x Débito (${appState.config.cardFees.debit}%)</option>`;
                }
                installmentSelect.innerHTML = options;
                calcCardFee(total);
            }
        }

        function calcCardFee(total) {
            const installmentSelect = document.getElementById('pdv-installments');
            if (!installmentSelect) return;
            
            const perc = parseFloat(installmentSelect.value) || 0;
            const feeVal = total * (perc / 100);
            const netVal = total - feeVal;
            
            document.getElementById('pdv-net-val').innerText = formatCurrency(netVal);
            document.getElementById('pdv-fee-info').innerText = `Taxa: ${formatCurrency(feeVal)}`;
        }

        function calcChange(total) {
            const received = parseFloat(document.getElementById('pdv-received').value) || 0;
            const change = received - total;
            document.getElementById('pdv-change-val').innerText = formatCurrency(Math.max(0, change));
        }

        function confirmSale(total, status = 'completed') {
            if (currentCart.length === 0) return;
            
            const method = document.getElementById('pdv-final-method').value;
            const saleId = Math.floor(100000 + Math.random() * 900000); 
            
            // Taxas de Cartão
            let feeAmount = 0;
            let installments = 1;
            if (method.toLowerCase().includes('cartão')) {
                const installmentSelect = document.getElementById('pdv-installments');
                const perc = parseFloat(installmentSelect.value) || 0;
                installments = installmentSelect.options[installmentSelect.selectedIndex].text.split('x')[0];
                feeAmount = total * (perc / 100);
            }

            // 1. Record Sale
            const sale = {
                id: saleId,
                clientId: pdvClient ? pdvClient.id : 0,
                clientName: pdvClient ? pdvClient.name : 'Consumidor Final',
                date: new Date().toISOString().split('T')[0],
                deliveryDate: status === 'pending' ? document.getElementById('pdv-delivery-date').value : null,
                items: currentCart.map(i => ({ ...i })),
                total: total,
                paymentMethod: method,
                installments: installments,
                discount: pdvDiscount,
                fee: feeAmount,
                status: status, // 'completed' or 'pending'
                employeeId: currentUser.role === 'Vendedor' ? 1 : null 
            };

            if (status === 'pending') {
                const first = sale.items[0];
                const p = first ? appState.inventory.find(x => x.id === first.productId) : null;
                const helperFeePerUnit = p?.helperFee || 0;
                const helperUnits = sale.items.reduce((acc, i) => acc + (i.qty || 0), 0);
                sale.deliveryHelperCount = 1;
                sale.deliveryHelperFeePerUnit = helperFeePerUnit;
                sale.deliveryHelperUnits = helperUnits;
                sale.deliveryHelperCostTotal = sale.deliveryHelperCount * sale.deliveryHelperFeePerUnit * helperUnits;
            } else {
                sale.deliveryHelperCount = 0;
                sale.deliveryHelperFeePerUnit = 0;
                sale.deliveryHelperUnits = 0;
                sale.deliveryHelperCostTotal = 0;
            }
            appState.sales.push(sale);

            // 2. Record Transactions ONLY if completed now
            if (status === 'completed') {
                // Entrada (Bruto)
                appState.transactions.push({
                    id: Date.now(),
                    type: 'entrada',
                    category: 'Venda de Pré-moldados',
                    amount: total,
                    date: sale.date,
                    description: `Venda #${saleId} - ${sale.clientName}`,
                    account: 'Caixa Principal',
                    paymentMethod: method
                });

                // Saída (Taxa de Cartão) se houver
                if (feeAmount > 0) {
                    appState.transactions.push({
                        id: Date.now() + 1,
                        type: 'saida',
                        category: 'Taxas de Cartão',
                        amount: feeAmount,
                        date: sale.date,
                        description: `Taxa Cartão - Venda #${saleId}`,
                        account: 'Caixa Principal',
                        paymentMethod: method
                    });
                }
            }

            // 3. Update Inventory (Stock is reserved anyway)
            currentCart.forEach(item => {
                const product = appState.inventory.find(p => p.id === item.productId);
                if (product) {
                    product.stock -= item.qty;
                }
            });

            saveData();
            
            if (status === 'completed') {
                showToast(feeAmount > 0 ? `Venda finalizada! Líquido: ${formatCurrency(total - feeAmount)}` : 'Venda finalizada!');
                openPostSaleSuccessModal(sale);
            } else {
                showToast('Pedido agendado para entrega!', 'success');
                closeModal();
                renderVendas();
            }
            
            currentCart = [];
            pdvDiscount = 0;
            pdvClient = null;
        }

        function getMonthRange(yyyyMm) {
            const [y, m] = yyyyMm.split('-').map(Number);
            const start = `${yyyyMm}-01`;
            const endDate = new Date(y, m, 0);
            const end = endDate.toISOString().split('T')[0];
            return { start, end };
        }

        function formatPercent(val) {
            return `${(val * 100).toFixed(1)}%`;
        }

        function groupSum(items, keyFn, amountFn) {
            const map = new Map();
            items.forEach(i => {
                const k = keyFn(i) || 'Sem categoria';
                const v = amountFn(i) || 0;
                map.set(k, (map.get(k) || 0) + v);
            });
            return Array.from(map.entries())
                .map(([key, value]) => ({ key, value }))
                .sort((a, b) => b.value - a.value);
        }

        function computeFinanceDRE(start, end) {
            const transactions = appState.transactions.filter(t => t.date && (!start || t.date >= start) && (!end || t.date <= end));
            const entradas = transactions.filter(t => t.type === 'entrada');
            const saidas = transactions.filter(t => t.type === 'saida');

            const totalIn = entradas.reduce((acc, t) => acc + (t.amount || 0), 0);
            const totalOut = saidas.reduce((acc, t) => acc + (t.amount || 0), 0);
            const net = totalIn - totalOut;

            const entradasByCategory = groupSum(entradas, t => t.category || 'Sem categoria', t => t.amount);
            const saidasByCategory = groupSum(saidas, t => t.category || 'Sem categoria', t => t.amount);

            const byAccount = groupSum(transactions, t => t.account || 'Sem conta', t => (t.type === 'entrada' ? (t.amount || 0) : -(t.amount || 0)));
            const byPayment = groupSum(transactions, t => t.paymentMethod || 'Sem método', t => (t.type === 'entrada' ? (t.amount || 0) : -(t.amount || 0)));

            const completedSales = appState.sales
                .filter(s => s.status === 'completed' && s.date && (!start || s.date >= start) && (!end || s.date <= end));
            const pendingSalesCount = appState.sales.filter(s => s.status === 'pending').length;
            const salesCount = completedSales.length;
            const salesGross = completedSales.reduce((acc, s) => acc + (s.total || 0), 0);
            const salesAvg = salesCount > 0 ? (salesGross / salesCount) : 0;
            const itemsSold = completedSales.reduce((acc, s) => acc + (s.items || []).reduce((sum, i) => sum + (i.qty || 0), 0), 0);

            return {
                totalIn,
                totalOut,
                net,
                entradasByCategory,
                saidasByCategory,
                byAccount,
                byPayment,
                salesCount,
                salesGross,
                salesAvg,
                itemsSold,
                pendingSalesCount
            };
        }

        function computeRealProductCostReport(start, end, productId, clientId) {
            const sales = appState.sales.filter(s => {
                const isConfirmedDelivery = s.status === 'completed' && !!s.deliveryDate;
                if (!isConfirmedDelivery) return false;
                if (start && s.deliveryDate < start) return false;
                if (end && s.deliveryDate > end) return false;
                if (clientId && String(s.clientId || 0) !== String(clientId)) return false;
                return true;
            });

            const rows = [];
            sales.forEach(sale => {
                const helperCount = sale.deliveryHelperCount ?? 1;
                const helperFeePerUnit = sale.deliveryHelperFeePerUnit ?? 0;
                (sale.items || []).forEach(item => {
                    const p = appState.inventory.find(x => x.id === item.productId);
                    if (productId && String(item.productId) !== String(productId)) return;

                    const qty = item.qty || 0;
                    const revenue = (item.price || 0) * qty;
                    const fabricationCost = (p?.costPrice || 0) * qty;
                    const effectiveHelperFee = helperFeePerUnit || (p?.helperFee || 0);
                    const helperCost = qty * helperCount * effectiveHelperFee;
                    const totalCost = fabricationCost + helperCost;
                    const profit = revenue - totalCost;

                    rows.push({
                        saleId: sale.id,
                        deliveryDate: sale.deliveryDate || sale.date,
                        clientId: sale.clientId || 0,
                        clientName: sale.clientName || '',
                        productId: item.productId,
                        productName: item.name || p?.name || 'Produto',
                        qty,
                        revenue,
                        fabricationCost,
                        helperCount,
                        helperFeePerUnit: effectiveHelperFee,
                        helperCost,
                        totalCost,
                        profit
                    });
                });
            });

            rows.sort((a, b) => (b.deliveryDate || '').localeCompare(a.deliveryDate || '') || (b.saleId - a.saleId));

            const totals = rows.reduce((acc, r) => {
                acc.totalQty += r.qty;
                acc.totalRevenue += r.revenue;
                acc.totalFabrication += r.fabricationCost;
                acc.totalHelpers += r.helperCost;
                acc.totalProfit += r.profit;
                return acc;
            }, { totalQty: 0, totalRevenue: 0, totalFabrication: 0, totalHelpers: 0, totalProfit: 0 });

            return { rows, totals };
        }

        // --- GOALS RENDER ---
        function renderMetas() {
            const now = new Date();
            const currentMonth = now.toISOString().substring(0, 7);
            const currentMonthName = now.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
            
            // LÓGICA DE DATA DE RESET (Consistente com Dashboard)
            let resetDateStr = appState.config.breakEvenResetDate || currentMonth + '-01';
            let resetDate = new Date(resetDateStr);
            const todayStr = now.toISOString().split('T')[0];
            const todayDate = new Date(todayStr);
            let daysElapsed = Math.floor((todayDate - resetDate) / (1000 * 60 * 60 * 24)) + 1;
            if (daysElapsed > 30) {
                appState.config.breakEvenResetDate = todayStr;
                saveData();
                resetDateStr = todayStr;
                resetDate = new Date(resetDateStr);
                daysElapsed = 1;
            }

            // Ponto de Equilíbrio Calculations
            const salariesCosts = appState.employees.reduce((acc, emp) => acc + (emp.salary || 0), 0);
            const baseFixedCosts = appState.fixedAccounts.reduce((acc, a) => acc + a.amount, 0) + salariesCosts;
            
            // Gastos reais desde o último reset
            const actualExpenses = appState.transactions
                .filter(t => t.type === 'saida' && t.date >= resetDateStr)
                .reduce((acc, t) => acc + t.amount, 0);

            // Vendas desde o último reset
            const monthlySales = appState.sales.filter(s => s.date >= resetDateStr && s.status === 'completed');
            const totalRevenue = monthlySales.reduce((acc, s) => acc + s.total, 0);
            
            const totalVariableCosts = monthlySales.reduce((acc, s) => {
                const materialsCost = s.items.reduce((itemAcc, item) => {
                    const product = appState.inventory.find(p => p.id === item.productId);
                    return itemAcc + (product ? (product.costPrice * item.qty) : 0);
                }, 0);
                return acc + materialsCost + (s.deliveryHelperCostTotal || 0);
            }, 0);

            const contributionMargin = totalRevenue - totalVariableCosts;
            const contributionMarginPct = totalRevenue > 0 ? (contributionMargin / totalRevenue) : 0.35;
            
            // Break-even point in Value: Fixed Costs / Contribution Margin %
            const breakEvenValue = contributionMarginPct > 0 ? (baseFixedCosts / contributionMarginPct) : baseFixedCosts;
            
            // Progress towards break-even
            const breakEvenProgress = breakEvenValue > 0 ? Math.min(100, (totalRevenue / breakEvenValue) * 100) : 100;
            const isBreakEvenReached = totalRevenue >= breakEvenValue;

            let html = `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <div>
                        <h2 class="text-2xl font-bold dark:text-white">Metas e Sustentabilidade</h2>

                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reiniciar Ciclo
                        </button>
                        <button onclick="openGoalModal()" class="bg-primary-600 hover:bg-primary-700 text-white px-4 py-2 rounded-xl flex items-center gap-2 font-semibold shadow-lg shadow-primary-500/20 transition-all">
                            <i data-lucide="plus" class="w-4 h-4"></i> Nova Meta
                        </button>
                    </div>
                </div>

                <!-- Ponto de Equilíbrio Card Redesenhado -->
                <div class="mb-8 bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden animate-fade-in">
                    <div class="p-6 border-b border-slate-100 dark:border-slate-700 bg-slate-50/30 dark:bg-slate-700/10 flex justify-between items-center">
                        <h3 class="font-bold dark:text-white flex items-center gap-2">
                            <i data-lucide="scale" class="w-5 h-5 text-primary-500"></i>
                            Análise de Equilíbrio - ${currentMonthName}
                        </h3>
                        <span class="px-3 py-1 ${isBreakEvenReached ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'} text-[10px] font-black rounded-full uppercase">
                            ${isBreakEvenReached ? 'Operação Lucrativa' : 'Em Busca do Equilíbrio'}
                        </span>
                    </div>
                    
                    <div class="p-6">
                        <div class="mb-4 flex items-center gap-3">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ciclo atual</span>
                            <span class="text-xs font-black text-primary-600">Dia ${daysElapsed} / 30</span>
                            <div class="h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden w-32">
                                <div class="bg-primary-500 h-full" style="width: ${Math.min(100, (daysElapsed / 30) * 100)}%"></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

                                <div class="relative w-32 h-32 mb-4">
                                    <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">

                                        <circle cx="18" cy="18" r="16" fill="none" class="${isBreakEvenReached ? 'stroke-green-500' : 'stroke-primary-500'}" stroke-width="3" stroke-dasharray="${breakEvenProgress} 100" stroke-linecap="round"></circle>
                                    </svg>
                                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                                        <span class="text-2xl font-black dark:text-white">${Math.round(breakEvenProgress)}%</span>
                                    </div>
                                </div>
                                <p class="text-xs font-bold text-slate-500 uppercase">Cobertura Total</p>
                            </div>

                            <!-- Financial Summary -->
                            <div class="lg:col-span-3 grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div class="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-700">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Custo Fixo Total</p>
                                    <p class="text-sm font-black text-red-500">${formatCurrency(baseFixedCosts)}</p>

                                    <p class="text-[9px] text-slate-400 mt-1 italic">(Vendas Concluídas)</p>
                                </div>
                                <div class="p-4 bg-slate-50 dark:bg-slate-700/50 rounded-2xl border border-slate-100 dark:border-slate-700">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Meta para Lucrar</p>
                                    <p class="text-sm font-black text-slate-900 dark:text-white">${formatCurrency(breakEvenValue)}</p>
                                    <p class="text-[9px] text-slate-400 mt-1 italic">(Baseado na margem)</p>
                                </div>
                            </div>
                        </div>

                        <!-- Progress Insight -->
                        <div class="mt-8 p-4 bg-primary-50 dark:bg-primary-900/10 rounded-2xl border border-primary-100 dark:border-primary-800/30">
                            <div class="flex flex-col md:flex-row justify-between items-center gap-4">

        function saveAccessSettings() {
            const emailEl = document.getElementById('conf-login-email');
            const currentPassEl = document.getElementById('conf-login-current-pass');
            const passEl = document.getElementById('conf-login-pass');
            const hintEl = document.getElementById('conf-login-hint');

            const currentPass = (currentPassEl?.value || '').trim();
            let newPass = (passEl?.value || '').trim();
            const email = (emailEl?.value || '').trim();
            const hint = (hintEl?.value || '').trim();

            if (currentPass !== appState.config.loginPassword) {
                showToast('A senha atual está incorreta.', 'error');
                return;
            }

            // Se a nova senha estiver vazia, mantém a atual
            if (!newPass) {
                newPass = appState.config.loginPassword;
            }

            const html = `
                <div class="p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-black dark:text-white uppercase tracking-tight">Confirmar Alteração</h3>
                        <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full">

                            Cancelar

                            Confirmar
                        </button>
                    </div>

            `;
            openModal(html);
            
            const confirmBtn = document.getElementById('confirm-pass-change');
            if (confirmBtn) {

                    updateLoginHint();
                    closeModal();

                    lastMaintenance: document.getElementById('eq-last').value,
                    maintenanceInterval: parseInt(document.getElementById('eq-interval').value),

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "finance_pro_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    appState = imported;
                    saveData();
                    location.reload();
                } catch (err) {
                    showToast('Erro ao importar arquivo!', 'error');
                }
            };
            reader.readAsText(file);
        }

        async function clearData() {
            const ok = confirm('ATENÇÃO: Isso vai ZERAR o app (dados, login e tema) permanentemente. Continuar?');
            if (!ok) return;

            try {
                localStorage.clear();
            } catch (_) {
            }

            try {
                localStorage.setItem('financeProData', JSON.stringify(createEmptyState()));
            } catch (_) {
            }

            try {
                if ('caches' in window) {
                    const cacheKeys = await caches.keys();
                    await Promise.all(cacheKeys.map((k) => caches.delete(k)));
                }
            } catch (_) {
            }

            try {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map((r) => r.unregister()));
                }
            } catch (_) {
            }

            window.location.replace(window.location.pathname + '?r=' + Date.now());
        }

        // --- APP INITIALIZATION ---
        function initApp() {
            if (!currentUser) return;
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            // Update UI with user info
            document.getElementById('user-display-name').innerText = currentUser.name;
            document.getElementById('user-display-role').innerText = currentUser.role;
            document.getElementById('user-avatar').src = currentUser.avatar;
            
            // Apply theme
            const savedTheme = localStorage.getItem('financeProTheme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            }

            switchTab('dashboard');
            try {
                lucide.createIcons();
            } catch (_) {
            }
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            contentArea.scrollTo(0,0);
            
            switch(currentTab) {
                case 'dashboard': renderDashboard(); break;
                case 'producao': renderProducao(); break;
                case 'estoque': renderEstoque(); break;
                case 'caixa': renderCaixa(); break;
                case 'funcionarios': renderFuncionarios(); break;
                case 'clientes': renderClientes(); break;
                case 'vendas': renderVendas(); break;
                case 'relatorios': renderRelatorios(); break;
                case 'metas': renderMetas(); break;
                case 'config': renderConfig(); break;
            }
        }

        // Auto-init if user already logged in
        window.onload = () => {
            if (currentUser) {
                initApp();
            } else {
                try {
                    lucide.createIcons();
                } catch (_) {
                }
            }
        };

        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }

        // Sidebar Toggle for Mobile
        document.getElementById('toggle-sidebar').onclick = () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        };

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('toggle-sidebar');
            if (window.innerWidth < 768 && 
                !sidebar.contains(e.target) && 
                !toggleBtn.contains(e.target) && 
                !sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.add('-translate-x-full');
            }
        });
    </script>
